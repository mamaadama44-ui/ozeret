/* ---------- קריאה ל-AI (דורשת מפתח של בני) ----------
   מחוץ לסביבת Claude צריך מפתח Anthropic. נשמר מקומית בדפדפן.
   אם אין מפתח — הפיצ'רים האלה מציגים הודעה מנומסת. */
async function callAI(prompt, apiKey) {
  if (!apiKey) throw new Error("no-key");
  const res = await fetch("https://api.anthropic.com/v1/messages", {
    method: "POST",
    headers: {
      "Content-Type": "application/json",
      "x-api-key": apiKey,
      "anthropic-version": "2023-06-01",
      "anthropic-dangerous-direct-browser-access": "true",
    },
    body: JSON.stringify({
      model: "claude-sonnet-4-6",
      max_tokens: 1000,
      messages: [{ role: "user", content: prompt }],
    }),
  });
  const data = await res.json();
  return data.content.filter((b) => b.type === "text").map((b) => b.text).join("").trim();
}

/* ---------- קריאה ל-AI עם קובץ (תמונה / PDF) ---------- */
async function callAIWithFile(prompt, fileData, mediaType, apiKey) {
  if (!apiKey) throw new Error("no-key");
  const isPdf = mediaType === "application/pdf";
  const fileBlock = isPdf
    ? { type: "document", source: { type: "base64", media_type: "application/pdf", data: fileData } }
    : { type: "image", source: { type: "base64", media_type: mediaType, data: fileData } };
  const res = await fetch("https://api.anthropic.com/v1/messages", {
    method: "POST",
    headers: {
      "Content-Type": "application/json",
      "x-api-key": apiKey,
      "anthropic-version": "2023-06-01",
      "anthropic-dangerous-direct-browser-access": "true",
    },
    body: JSON.stringify({
      model: "claude-sonnet-4-6",
      max_tokens: 4000,
      messages: [{ role: "user", content: [fileBlock, { type: "text", text: prompt }] }],
    }),
  });
  const data = await res.json();
  if (data.error) throw new Error(data.error.message || "api-error");
  return data.content.filter((b) => b.type === "text").map((b) => b.text).join("").trim();
}

  const [farmLoaded, setFarmLoaded] = useState(false);
  const [farmReadBusy, setFarmReadBusy] = useState(false);
  // ----- אולגה מלמדת -----
  const [tipDismissed, setTipDismissed] = useState({}); // {capId: lastDayShown}
  const [showTour, setShowTour] = useState(false);
  const [tourSeen, setTourSeen] = useState(false);
  // ----- טקס בוקר (בהשראת ג'ו דיספנזה) -----
  const [ritualOpen, setRitualOpen] = useState(false);
  const [ritualStep, setRitualStep] = useState(0);  // 0=עוגן 1=כוונה 2=חזרה מנטלית 3=פגישות 4=שלושת הדברים 5=סגירה
  const [ritualFeeling, setRitualFeeling] = useState("");   // איך אני רוצה להרגיש

  const tk = todayKey();
  const greeting = useMemo(() => GREETINGS[new Date().getDate() % GREETINGS.length], []);
  const showToast = (m) => { setToast(m); setTimeout(() => setToast(null), 2800); };

  /* ----- טעינה ראשונית מ-Firebase ----- */
  useEffect(() => {
    const savedKey = (window.localStorage && localStorage.getItem("anthKey")) || (window.sessionStorage && sessionStorage.getItem("anthKey")) || "";
    if (savedKey) setApiKey(savedKey);
    if (!firebaseReady) { setLoaded(true); return; }
    DOC_REF().get().then((snap) => {
      if (snap.exists) {
        const d = snap.data();
        if (d.tasks) setTasks(bonusArr(d.tasks).map((t) => ({ ...t, steps: bonusArr(t.steps), feedback: bonusArr(t.feedback) })));
        if (d.habitLog) setHabitLog(d.habitLog);
        if (d.focus && d.focusDay === tk) { setFocus(d.focus); setCheckedInDay(tk); }
        if (typeof d.lastAnalyzedAt === "number") setLastAnalyzedAt(d.lastAnalyzedAt);
        if (d.patterns) setPatterns(d.patterns);
        if (d.eveningNotes) setEveningNotes(d.eveningNotes);
        if (d.shopList) setShopList(d.shopList);
        if (d.money) setMoney(d.money);
        if (d.ritualDoneDay) setRitualDoneDay(d.ritualDoneDay);
        if (d.ritualFeeling) setRitualFeeling(d.ritualFeeling);
        if (d.ritualVision) setRitualVision(d.ritualVision);
        if (d.tipDismissed) setTipDismissed(d.tipDismissed);
        if (Array.isArray(d.areas)) setAreas(d.areas);
        if (d.tourSeen) setTourSeen(true);
        else setShowTour(true); // סיור ראשוני בפעם הראשונה
      }
      setLoaded(true);
    }).catch((e) => { console.warn(e); setLoaded(true); });
  }, []);

  /* ----- שמירה ל-Firebase בכל שינוי ----- */
  useEffect(() => {
    if (!loaded || !firebaseReady) return;
    const payload = {
      tasks, habitLog,
      focus: checkedInDay === tk ? focus : "",
      focusDay: checkedInDay === tk ? tk : "",
      lastAnalyzedAt, patterns: patterns || null,
      eveningNotes, shopList, money,
      ritualDoneDay, ritualFeeling, ritualVision,
      tourSeen, tipDismissed, areas,
      updatedAt: new Date().toISOString(),
    };
    DOC_REF().set(payload, { merge: true }).catch((e) => console.warn("save failed", e));
  }, [tasks, habitLog, focus, checkedInDay, patterns, lastAnalyzedAt, eveningNotes, shopList, money, ritualDoneDay, ritualFeeling, ritualVision, tourSeen, tipDismissed, areas, loaded]);

  const saveKey = (v) => {
    setApiKey(v);
    try { if (window.localStorage) localStorage.setItem("anthKey", v); } catch (e) {}
  };

  // ----- טיק של טיימר פומודורו -----
  useEffect(() => {
    if (!pomoRunning) return;
    const id = setInterval(() => {
      setPomoLeft((prev) => {
        if (prev <= 1) {
          const speakP = (txt) => { try { if ("speechSynthesis" in window) { const u = new SpeechSynthesisUtterance(txt); u.lang = "he-IL"; speechSynthesis.speak(u); } } catch (e) {} };
          if (pomoMode === "work") {
            setPomoCount((c) => c + 1);
            setPomoMode("break");
            speakP("כל הכבוד! סיימת סבב עבודה. קח הפסקה של חמש דקות.");
            showToast("🎉 סיימת סבב! קח הפסקה של 5 דקות.");
            return 5 * 60;
          } else {
            setPomoMode("work");
            speakP("ההפסקה נגמרה. בוא נחזור לעבודה.");
            showToast("⏰ ההפסקה נגמרה — בחזרה לעבודה!");
            return 25 * 60;
          }
        }
        return prev - 1;
      });
    }, 1000);
    return () => clearInterval(id);
  }, [pomoRunning, pomoMode]);

  const pomoReset = () => { setPomoRunning(false); setPomoMode("work"); setPomoLeft(25 * 60); };
  const pomoFmt = (s) => String(Math.floor(s / 60)).padStart(2, "0") + ":" + String(s % 60).padStart(2, "0");

  const openTasks = tasks.filter((t) => t.status !== "done");
  const doneCount = tasks.filter((t) => t.status === "done").length;
  const pct = Math.round((doneCount / tasks.length) * 100);
  const flightOpen = openTasks.filter((t) => t.cat === "טיסה");
  const nextTask = [...flightOpen].sort((a, b) => (a.due || "9").localeCompare(b.due || "9"))[0];
  const todayHabits = habitLog[tk] || {};
  const habitsDone = habits.filter((h) => todayHabits[h.id]).length;

  const sortedOpen = openTasks.slice().sort((a, b) => (a.due || "9").localeCompare(b.due || "9"));
  const todayTasks = sortedOpen.filter((t) => t.due && daysUntil(t.due) <= 2);
  const laterTasks = sortedOpen.filter((t) => !(t.due && daysUntil(t.due) <= 2));
  const homeTasksRaw = showAllTasks ? sortedOpen : todayTasks;
  const homeTasks = topicFilter === "all" ? homeTasksRaw : homeTasksRaw.filter((t) => (t.topic || "general") === topicFilter);

  const weekDayNames = ["א׳", "ב׳", "ג׳", "ד׳", "ה׳", "ו׳", "ש׳"];
  const isoOf = (d) => d.getFullYear() + "-" + String(d.getMonth() + 1).padStart(2, "0") + "-" + String(d.getDate()).padStart(2, "0");
  const buildWeek = () => {
    const out = [];
    const base = new Date();
    for (let i = 0; i < 7; i++) {
      const d = new Date(base);
      d.setDate(base.getDate() + i);
      const iso = isoOf(d);
      const count = openTasks.filter((t) => t.due === iso).length;
      out.push({ iso, count, dayName: weekDayNames[d.getDay()], dayNum: d.getDate(), isToday: i === 0 });
    }
    return out;
  };
  const weekDays = buildWeek();
  const loadColor = (count) => {
    if (count <= 0) return C.panel2;
    if (count === 1) return "#fde0e4";
    if (count === 2) return "#f9b8c1";
    if (count === 3) return "#f2818f";
    return "#e2445c";
  };
  const loadText = (count) => (count >= 3 ? "#ffffff" : C.text);

  const heMonths = ["ינואר", "פברואר", "מרץ", "אפריל", "מאי", "יוני", "יולי", "אוגוסט", "ספטמבר", "אוקטובר", "נובמבר", "דצמבר"];
  const tasksOnDay = (iso) => tasks.filter((t) => t.due === iso);
  const buildMonth = () => {
    const y = calMonth.getFullYear(), m = calMonth.getMonth();
    const first = new Date(y, m, 1);
    const startPad = first.getDay();
    const daysInMonth = new Date(y, m + 1, 0).getDate();
    const cells = [];
    for (let i = 0; i < startPad; i++) cells.push(null);
    for (let d = 1; d <= daysInMonth; d++) {
      const iso = y + "-" + String(m + 1).padStart(2, "0") + "-" + String(d).padStart(2, "0");
      cells.push({ d, iso, count: tasksOnDay(iso).filter((t) => t.status !== "done").length, isToday: iso === tk });
    }
    return cells;
  };
  const addTaskOnDay = (iso) => {
    const v = calNewTask.trim(); if (!v) return;
    setTasks((p) => [...p, { id: "u" + Date.now(), title: v, due: iso, cat: "כללי", topic: "general", repeat: "once", prio: "med", status: "todo", owner: "בני", steps: [], feedback: [] }]);
    setCalNewTask(""); showToast("נוספה משימה לתאריך.");
  };

  const periodStart = (period) => {
    const d = new Date(); d.setHours(0, 0, 0, 0);
    if (period === "day") return d;
    if (period === "week") { const x = new Date(d); x.setDate(d.getDate() - 6); return x; }
    const x = new Date(d); x.setDate(d.getDate() - 29); return x;
  };
  const buildSummary = (period) => {
    const start = periodStart(period);
    const inRange = (iso) => { if (!iso) return false; const dt = new Date(iso); return dt >= start; };
    const done = tasks.filter((t) => t.status === "done" && (inRange(t.doneAt) || inRange(t.due)));
    const open = tasks.filter((t) => t.status !== "done");
    const overdue = open.filter((t) => t.due && daysUntil(t.due) < 0);
    const byTopic = {};
    done.forEach((t) => { const k = t.topic || "general"; byTopic[k] = (byTopic[k] || 0) + 1; });
    const byOwner = {};
    done.forEach((t) => { const k = t.owner || "בני"; byOwner[k] = (byOwner[k] || 0) + 1; });
    return { done, open, overdue, byTopic, byOwner };
  };
  const periodLabel = { day: "היום", week: "השבוע", month: "החודש" };

  /* ----- קול ----- */
  const speak = (text) => {
    if (!("speechSynthesis" in window)) { showToast("הקול לא נתמך בדפדפן הזה"); return; }
    window.speechSynthesis.cancel();
    const u = new SpeechSynthesisUtterance(text);
    u.lang = "he-IL"; u.rate = 1; u.pitch = 1;
    const v = window.speechSynthesis.getVoices().find((x) => x.lang && x.lang.toLowerCase().startsWith("he"));
    if (v) u.voice = v;
    window.speechSynthesis.speak(u);
  };
  const stopSpeak = () => { if ("speechSynthesis" in window) window.speechSynthesis.cancel(); };

  const summaryText = useMemo(() => {
    const urgent = tasks.filter((t) => t.status !== "done" && t.due && daysUntil(t.due) <= 2);
    const p = ["בוקר טוב בני."];
    if (checkedInDay === tk && focus.trim()) p.push("המוקד שלך להיום: " + focus + ".");
    p.push("יש לך " + openTasks.length + " משימות פתוחות, השלמת " + doneCount + ", אתה ב-" + pct + " אחוז.");
    p.push(urgent.length ? "דורש תשומת לב: " + urgent.map((t) => t.title).join(", ") + "." : "שום דבר לא בוער כרגע.");
    if (nextTask) p.push("הבא בתור: " + nextTask.title + ".");
    p.push("הרגלים היום: השלמת " + habitsDone + " מתוך " + habits.length + ".");
    p.push("יאללה, צעד אחד קדימה.");
    return p.join(" ");
  }, [tasks, focus, checkedInDay, tk, openTasks.length, doneCount, pct, nextTask, habitsDone, habits.length]);

  // הקראה אוטומטית בכניסה — מבוטלת. אולגה מקריאה רק בלחיצה על "דבר אליי",
  // והמתג "קול" שולט רק על הקראת תשובות בשיחה.

  /* ---------- מאמן אולגה — בודק כמה פעמים ביום ---------- */
  const coachData = useMemo(() => {
    const h = new Date().getHours();
    const slot = h < 12 ? "morning" : h < 17 ? "midday" : "evening";
    const open = tasks.filter((t) => t.status !== "done");
    const overdue = open.filter((t) => t.due && daysUntil(t.due) < 0);
    const dueToday = open.filter((t) => t.due && daysUntil(t.due) === 0);
    const urgent = open.filter((t) => t.due && daysUntil(t.due) > 0 && daysUntil(t.due) <= 2);
    const doneToday = tasks.filter((t) => t.status === "done" && (t.doneAt === tk || t.due === tk));
    const stale = open.filter((t) => t.due && daysUntil(t.due) < 0 && t.status === "todo");
    const meetingsToday = open.filter((t) => t.due === tk && t.startTime);
    return { slot, open, overdue, dueToday, urgent, doneToday, stale, meetingsToday };
  }, [tasks, tk]);

  const slotHe = { morning: "בוקר", midday: "צהריים", evening: "ערב" };

  // ----- באנר דחיפה: ההתראה הדחופה ביותר (עדין — רק כשבאמת חשוב) -----
  const urgentAlert = useMemo(() => {
    const d = coachData;
    const nowMin = new Date().getHours() * 60 + new Date().getMinutes();
    // 1. פגישה שמתקרבת היום (בתוך שעתיים)
    const soon = d.meetingsToday
      .map((m) => { const [hh, mm] = (m.startTime || "0:0").split(":").map(Number); return { m, min: hh * 60 + mm }; })
      .filter((x) => x.min >= nowMin && x.min - nowMin <= 120)
      .sort((a, b) => a.min - b.min)[0];
    if (soon) {
      const diff = soon.min - nowMin;
      return { icon: "⏰", text: 'בעוד ' + (diff <= 0 ? "רגע" : diff + " דק׳") + ': ' + soon.m.title + (soon.m.startTime ? " (" + soon.m.startTime + ")" : ""), tone: "warn" };
    }
    // 2. משימות שעבר זמנן ולא זזו
    if (d.stale.length > 0) {
      return { icon: "🔴", text: d.stale.length + " " + (d.stale.length === 1 ? "משימה חיכתה" : "משימות חיכו") + " יותר מדי — הכי דחופה: " + d.stale[0].title, tone: "danger" };
    }
    // 3. הרבה להיום ועוד לא נגעת (אחרי 11 בבוקר)
    if (new Date().getHours() >= 11 && d.dueToday.length >= 3 && d.doneToday.length === 0) {
      return { icon: "📅", text: d.dueToday.length + " משימות להיום ועוד לא התחלת — בחר אחת קצרה ותתחיל", tone: "accent" };

  }, [coachData]);

  const coachText = useMemo(() => {

    if (d.stale.length > 0) {
      L.push("יש " + d.stale.length + " " + (d.stale.length === 1 ? "משימה שעבר זמנה ולא זזה" : "משימות שעבר זמנן ולא זזו") +
        ' — הראשונה: "' + d.stale[0].title + '". זה קורה כשהיום מתפזר. אל תנסה לסגור הכל — בחר אותה אחת, והזז אותה היום.');
    } else if (d.overdue.length > 0) {
      L.push("יש " + d.overdue.length + " באיחור, אבל כבר בתנועה — יופי. תן להן דחיפה אחרונה לסיום.");
    }

    if (d.slot === "morning") {
      if (d.dueToday.length || d.urgent.length) {
        const focusT = (d.dueToday[0] || d.urgent[0]);
        L.push("היום על הכוונת: " + (d.dueToday.length + d.urgent.length) + " משימות. הצעד הראשון שלך — \"" + focusT.title + "\".");
      } else if (d.stale.length === 0) {
        L.push("אין דדליין בוער היום. זה הזמן לדחוף קדימה משהו מהשבוע, לא לחכות.");
      }
      if (d.meetingsToday.length) {
        L.push("📅 יש לך היום " + d.meetingsToday.length + " " + (d.meetingsToday.length === 1 ? "פגישה" : "פגישות") +
          ": " + d.meetingsToday.map((m) => m.title + (m.startTime ? " (" + m.startTime + ")" : "")).join(", ") + ".");
      }
    } else if (d.slot === "midday") {
      if (d.doneToday.length > 0) L.push("סגרת היום " + d.doneToday.length + " — אתה בתנועה. " + (d.dueToday.length ? "נשארו " + d.dueToday.length + " להיום, בוא נמשיך." : "יפה."));
      else if (d.dueToday.length) L.push("עוד לא סגרת היום כלום, ויש " + d.dueToday.length + " שמחכות. בחר אחת קצרה — תנופה מתחילה מצעד אחד.");
      else L.push("יום רגוע. אם יש חצי שעה פנויה, קדם משהו מהשבוע.");
    } else {
      L.push(d.doneToday.length > 0
        ? "היום סגרת " + d.doneToday.length + ". עכשיו טקס ערב: מה נשאר פתוח, ומה 3 הדברים למחר."
        : "היום היה שקט בלוח. לא נורא — תכנן עכשיו את מחר, שתתחיל ממוקד.");
    }

    L.push(d.slot === "evening" ? "צעד אחרון: תכנן את מחר." : "יאללה — צעד אחד קדימה.");
    return L.join(" ");
  }, [coachData]);

  const speakCoach = () => speak(coachText);

  // ----- אולגה מלמדת: בוחר את הטיפ הכי רלוונטי שבני לא מנצל -----
  const dailyTip = useMemo(() => {
    const feedbackCount = tasks.reduce((n, t) => n + (bonusArr(t.feedback).length), 0);
    const state = { tasks, money, shopList, slot: coachData.slot, ritualDoneDay, tk, feedbackCount };
    // יכולות שרלוונטיות (detect=true) ושלא נדחו היום
    const candidates = CAPABILITIES.filter((c) => {
      try { return c.detect(state); } catch (e) { return false; }
    }).filter((c) => tipDismissed[c.id] !== tk);
    if (candidates.length === 0) return null;
    // בוחר לפי היום בשנה — מסתובב בין הטיפים
    const idx = new Date().getDate() % candidates.length;
    return candidates[idx];
  }, [tasks, money, shopList, coachData.slot, ritualDoneDay, tk, tipDismissed]);

  const dismissTip = (id) => setTipDismissed((p) => ({ ...p, [id]: tk }));

  // ----- תחומים (שיקום, בירוקרטיה, מטבח חוץ...) -----
  const addArea = (name) => {
    const clean = (name || "").trim();
    if (!clean) return null;
    const existing = areas.find((a) => a.name === clean);
    if (existing) return existing.id;
    const id = "area" + Date.now();
    setAreas((p) => [...p, { id, name: clean, createdAt: tk }]);
    return id;
  };
  const areaName = (id) => (areas.find((a) => a.id === id) || {}).name || "";
  // משימות פתוחות מקובצות לפי תחום
  const tasksByArea = useMemo(() => {
    const map = {};
    areas.forEach((a) => { map[a.id] = []; });
    const noArea = [];
    tasks.filter((t) => t.status !== "done").forEach((t) => {
      if (t.area && map[t.area]) map[t.area].push(t);
      else noArea.push(t);
    });
    return { map, noArea };
  }, [tasks, areas]);

  const deepCoach = async () => {
    setCoachBusy(true); setCoachDeep("");
    try {
      const d = coachData;
      const list = d.open.slice(0, 20).map((t) =>
        "• " + t.title + (t.due ? " (יעד " + fmtHe(t.due) + ", " + (daysUntil(t.due) < 0 ? "באיחור" : "עוד " + daysUntil(t.due) + " י׳") + ")" : " (בלי תאריך)") + " [" + (t.owner || "בני") + "]"
      ).join("\n");
      const prompt =
        'את אולגה — מאמנת אישית של בני, מנהל חווה חינוכית (שירת האדמה) ומפתח עסק יודאיקה.\n' +
        'את ישירה, חמה ומדרבנת — אף פעם לא מכלה. ביקורת בונה שמכוונת קדימה לפעולה, לא אחורה לאשמה.\n' +
        'עכשיו ' + slotHe[d.slot] + '. נתח את מצב בני ותן לו תדרוך קצר (4-6 משפטים):\n' +
        '1. על מה הוא מועד (מה לא זז ולמה כנראה). 2. מה הכי חשוב עכשיו. 3. צעד אחד קונקרטי. 4. אם יש משימה שעבר זמנה — עזור לו להבין למה ואיך לסדר לפעם הבאה.\n\n' +
        'משימות שעבר זמנן ולא זזו: ' + (d.stale.length || 0) + '\n' +
        'משימות להיום: ' + (d.dueToday.length || 0) + ' | סגר היום: ' + (d.doneToday.length || 0) + '\n\n' +
        'כל המשימות הפתוחות:\n' + (list || "אין") + '\n\nהתאריך היום: ' + tk;
      const text = await callAI(prompt, apiKey);
      setCoachDeep(text);

      : "🌅 בוקר בני. יום חדש, דף נקי. בחר את הדבר הגדול של היום.";
    events.push({ time: "08:30", title: morningMsg, dur: 15 });

    // 2. כל פגישה היום — תזכורת 30 דק׳ לפני (כבר עם שעה)
    d.meetingsToday.forEach((m) => {
      events.push({ startTime: m.startTime, title: "⏰ " + m.title, dur: 30, isMeeting: true });
    });

    // 3. דחיפת צהריים (13:00)
    events.push({ time: "13:00", title: "🔥 בני, איך מתקדם? כנס לאולגה ותראה מה נשאר — עוד יש זמן לסגור.", dur: 10 });

    // 4. סגירת ערב (20:00)
    events.push({ time: "20:00", title: "🌙 בני, רגע לסכם את היום ולתכנן מחר. כנס לאולגה לטקס הערב.", dur: 10 });

    // בניית ICS עם כל האירועים
    const stamp = new Date().toISOString().replace(/[-:]/g, "").split(".")[0] + "Z";
    let vevents = "";
    events.forEach((ev, i) => {
      const base = new Date(tk + "T00:00:00");
      const [hh, mm] = (ev.startTime || ev.time).split(":").map(Number);
      base.setHours(hh, mm, 0, 0);
      const end = new Date(base.getTime() + (ev.dur || 15) * 60000);
      const alarm = ev.isMeeting ? "-PT30M" : "-PT0M";
      vevents +=
        "BEGIN:VEVENT\r\n" +
        "UID:olga-rem-" + Date.now() + "-" + i + "@olga\r\n" +
        "DTSTAMP:" + stamp + "\r\n" +
        "DTSTART:" + isoStamp(base) + "\r\n" +
        "DTEND:" + isoStamp(end) + "\r\n" +
        "SUMMARY:" + ev.title + "\r\n" +
        "BEGIN:VALARM\r\nTRIGGER:" + alarm + "\r\nACTION:DISPLAY\r\nDESCRIPTION:" + ev.title + "\r\nEND:VALARM\r\n" +
        "END:VEVENT\r\n";
    });
    const ics = "BEGIN:VCALENDAR\r\nVERSION:2.0\r\nPRODID:-//Olga//HE\r\nCALSCALE:GREGORIAN\r\n" + vevents + "END:VCALENDAR";
    const blob = new Blob([ics], { type: "text/calendar;charset=utf-8" });
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url; a.download = "olga-reminders-" + tk + ".ics";
    document.body.appendChild(a); a.click(); document.body.removeChild(a);
    setTimeout(() => URL.revokeObjectURL(url), 1000);
    showToast("📲 נפתח — אשר, וקבל תזכורות דחיפה ביומן לאורך היום.");
  };

  const prioToFarm = { high: "high", med: "medium", low: "low" };
  const FARM_AREAS = [
    ["animals", "🐓 בעלי חיים"],
    ["forest", "🌲 יער"],
    ["nursery", "🌱 משתלה"],
    ["field", "🌾 שדה"],
    ["maint", "🔧 תחזוקה"],
    ["marketing", "📢 שיווק"],
    ["admin", "📋 ניהול"],
  ];
  const farmAreaLabel = (a) => (FARM_AREAS.find(([k]) => k === a) || [a, a])[1];
  // מיפוי uid של עובדי החווה לשמות (לזיהוי "מי תקוע")
  const FARM_WORKERS = {
    [window.FARM_MY_UID]: "בני",
  };
  const farmWorkerName = (uid) => FARM_WORKERS[uid] || (uid === window.FARM_MY_UID ? "בני" : "צוות החווה");

  // קריאה מהחווה — מושך את מערך oT ומסנן משימות פתוחות
  const readFarm = async () => {
    if (!farmReady) { setFarmLoaded(true); return; }
    setFarmReadBusy(true);
    try {
      const snap = await FARM_DOC().get();
      if (snap.exists) {
        const data = snap.data();
        const oT = Array.isArray(data.oT) ? data.oT : Object.values(data.oT || {});
        const open = oT.filter((t) => t && !t.done && (t.title || "").trim());
        setFarmTasks(open);
      }
      setFarmLoaded(true);
    } catch (e) {
      console.warn("readFarm failed:", e);
      setFarmLoaded(true);
    } finally { setFarmReadBusy(false); }
  };

  // קריאה ראשונית מהחווה בעת טעינת האפליקציה
  useEffect(() => { readFarm(); }, []);

  // סיכום "מי תקוע" בחווה — קיבוץ לפי בעלים
  const farmByOwner = useMemo(() => {
    const map = {};
    farmTasks.forEach((t) => {
      const who = farmWorkerName(t.uid || t.createdBy);
      if (!map[who]) map[who] = [];
      map[who].push(t);
    });
    return map;
  }, [farmTasks]);

  // משימות חווה שעבר זמנן (תקועות)
  const farmStale = useMemo(() =>
    farmTasks.filter((t) => {
      const d = t.scheduledDate || t.due;
      return d && /^\d{4}-\d{2}-\d{2}$/.test(d) && daysUntil(d) < 0;
    }), [farmTasks]);

  const sendToFarm = async () => {
    if (!editTask) return;
    if (!farmReady) { showToast("החיבור לחווה לא זמין כרגע."); return; }
    if (farmSending) return;
    setFarmSending(true);
    try {
      const snap = await FARM_DOC().get();
      if (!snap.exists) { showToast("לא נמצא מסמך החווה."); setFarmSending(false); return; }
      const data = snap.data();
      const oT = Array.isArray(data.oT) ? data.oT.slice() : Object.values(data.oT || {});
      const farmTask = {
        id: "ozeret-" + Date.now(),
        title: editTask.title.trim(),
        area: editTask.farmArea || "animals",
        pri: prioToFarm[editTask.prio] || "medium",
        uid: editTask.farmUid || window.FARM_MY_UID,
        scheduledDate: editTask.due || "",
        scheduledTime: editTask.farmTime || "",
        due: editTask.due || "",
        done: false,
        doneAt: null,
        createdBy: window.FARM_MY_UID,
      };
      oT.push(farmTask);
      await FARM_DOC().update({ oT });
      setTasks((p) => p.map((t) => t.id === editTask.id ? { ...t, sentToFarm: true } : t));
      setEditTask(null);
      showToast("✓ נשלחה לחווה — גיא ואליק יראו אותה.");
    } catch (e) {
      console.error("sendToFarm error:", e);
      showToast("שגיאה בשליחה לחווה. נסה שוב.");
    } finally {
      setFarmSending(false);
    }
  };

  const prioColor = (p) => (p === "high" ? C.danger : p === "med" ? C.warn : C.dim);

  if (!loaded) return <div style={{ ...S.root, textAlign: "center", paddingTop: 80, color: C.dim }}>טוען…</div>;

  return (
    <div dir="rtl" style={S.root}>
      <header style={S.header}>
        <div>
          <div style={S.eyebrow}>העוזרת {firebaseReady ? "· מחוברת" : "· מקומית"}</div>
          <h1 style={S.h1}>שלום בני</h1>
        </div>
        <div style={S.statRow}>
          <Stat label="פתוחות" value={openTasks.length} />
          <Stat label="הושלמו" value={doneCount} accent />
          <Stat label="התקדמות" value={pct + "%"} />
        </div>
      </header>

      <nav style={S.tabs}>
        {[["home", "בית"], ["chat", "צ׳אט"], ["cal", "📅 יומן"], ["shop", "🛒 קניות"], ["money", "💰 כספים"], ["summary", "📊 סיכומים"], ["board", "לוח"], ["trip", "מצב טיול"], ["focus", "🎧 פוקוס"], ["patterns", "דפוסים"]].map(([k, l]) => (
          <button key={k} onClick={() => setTab(k)} style={{ ...S.tab, ...(tab === k ? S.tabActive : {}) }}>{l}</button>
        ))}
      </nav>

      {tab === "home" && (
        <React.Fragment>
          {/* ===== באנר דחיפה — מופיע רק כשבאמת חשוב ===== */}
          {urgentAlert && (
            <section style={{ ...S.alertBanner,
              background: urgentAlert.tone === "danger" ? "linear-gradient(135deg,#a8341f,#8a2a18)"
                : urgentAlert.tone === "warn" ? "linear-gradient(135deg,#c9764f,#b3552d)"
                : "linear-gradient(135deg,#5b6ef5,#4858d0)" }}>
              <span style={S.alertIcon}>{urgentAlert.icon}</span>
              <span style={S.alertText}>{urgentAlert.text}</span>
            </section>
          )}

          {/* ===== מאמן אולגה — בוקר/צהריים/ערב ===== */}
          <section style={S.coachCard}>
            <div style={S.coachTop}>
              <span style={S.coachBadge}>🌻 אולגה · {slotHe[coachData.slot]}</span>
              <div style={S.coachTopBtns}>
                <button style={S.coachSpeak} onClick={speakCoach}>🔊 דבר אליי</button>
                <label style={S.coachVoiceToggle} title="הקראה אוטומטית של תשובות אולגה">
                  <input type="checkbox" checked={voiceOn} onChange={(e) => setVoiceOn(e.target.checked)} />
                  <span>קול</span>
                </label>
              </div>
            </div>
            <div style={S.coachMsg}>{coachText}</div>
            {coachDeep && <div style={S.coachDeep}>{coachDeep}</div>}

            {/* טיפ יומי — אולגה מלמדת */}
            {dailyTip && (
              <div style={S.tipCard}>
                <div style={S.tipHead}>
                  <span style={S.tipBadge}>💡 ידעת?</span>
                  <button style={S.tipDismiss} onClick={() => dismissTip(dailyTip.id)}>✕</button>
                </div>
                <div style={S.tipText}>{dailyTip.emoji} {dailyTip.tip}</div>
              </div>
            )}

            {/* כפתור טקס בוקר — מופיע בבוקר אם עוד לא נעשה היום */}
            {coachData.slot === "morning" && ritualDoneDay !== tk && (
              <button style={S.ritualStartBtn} onClick={startRitual}>
                🌅 התחל טקס בוקר — כוונה, חזון, ושלושה צעדים
              </button>
            )}
            {ritualDoneDay === tk && (
              <div style={S.ritualDoneNote}>☀️ טקס הבוקר הושלם היום{ritualFeeling ? " · המילה שלך: " + ritualFeeling : ""}</div>
            )}

            {/* שיחה מתמשכת עם המאמן */}
            {coachThread.length > 0 && (
              <div style={S.coachThread}>
                {coachThread.map((m, i) => (
                  <div key={i} style={m.role === "user" ? S.coachBubbleUser : S.coachBubbleAi}>
                    {m.text}
                    {m.added && m.added.length > 0 && (
                      <div style={S.coachAdded}>
                        ✓ {m.added.length === 1 ? "נוסף" : "נוספו"}: {m.added.join(" · ")}
                      </div>
                    )}
                  </div>
                ))}
                {coachBusy && <div style={S.coachBubbleAi}>אולגה חושבת…</div>}
              </div>
            )}

            {!coachDeep && coachThread.length === 0 && (
              <button style={{ ...S.coachDeepBtn, opacity: coachBusy ? 0.6 : 1 }} disabled={coachBusy} onClick={deepCoach}>
                {coachBusy ? "אולגה חושבת…" : "🤖 תדרוך עמוק — נתח אותי לעומק"}
              </button>
            )}

            {/* עזור לי למלא — מופיע רק כשהאפליקציה כמעט ריקה */}
            {!fillDone && openTasks.length <= 9 && (
              <button style={{ ...S.coachFillBtn, opacity: fillBusy ? 0.6 : 1 }} disabled={fillBusy} onClick={fillTabs}>
                {fillBusy ? "אולגה ממלאת בשבילך…" : "✨ עזור לי למלא — אולגה תכין משימות ויעדים"}
              </button>
            )}

            {/* שדה תשובה — מדבר עם המאמן */}
            <div style={S.coachInputRow}>
              <input style={S.coachInput} value={coachInput} onChange={(e) => setCoachInput(e.target.value)}
                placeholder="דבר/כתוב: הוסף, סגור, או שאל… 🎤" onKeyDown={(e) => e.key === "Enter" && coachChat()} />
              <button style={S.coachSend} disabled={coachBusy || !coachInput.trim()} onClick={coachChat}>שלח</button>
            </div>

            {/* העלאת קובץ — אולגה מנתחת ומכניסה למערכת */}
            <label style={{ ...S.coachUpload, opacity: uploadBusy ? 0.6 : 1 }}>
              {uploadBusy ? "📎 אולגה קוראת את הקובץ…" : "📎 העלה דף אשראי / קבלה / רשימה / צילום — אולגה תכניס למערכת"}
              <input type="file" accept="image/*,application/pdf" style={{ display: "none" }}
                disabled={uploadBusy} onChange={handleFileUpload} />
            </label>

            {/* תזכורות חכמות ליומן עם משפטי דחיפה */}
            <button style={S.coachReminders} onClick={makeSmartReminders}>
              📲 קבע לי תזכורות דחיפה להיום ביומן הטלפון
            </button>

            {/* תצוגה מקדימה לאישור */}
            {uploadPreview && (
              <div style={S.uploadPreview}>
                <div style={S.uploadSummary}>📋 {uploadPreview.summary || "אולגה קראה את הקובץ"}</div>
                <div style={S.uploadList}>
                  {uploadPreview.kind === "expenses" && (uploadPreview.expenses || []).map((x, i) => (
                    <div key={i} style={S.uploadItem}><span>{x.label}</span><span style={S.uploadAmount}>₪{x.amount} · {x.scope === "biz" ? "עסקי" : "פרטי"}</span></div>
                  ))}
                  {uploadPreview.kind === "tasks" && (uploadPreview.tasks || []).map((x, i) => (
                    <div key={i} style={S.uploadItem}><span>{x.title}</span>{x.due && <span style={S.uploadAmount}>{fmtHe(x.due)}</span>}</div>
                  ))}
                  {uploadPreview.kind === "shopping" && (uploadPreview.shopping || []).map((x, i) => (
                    <div key={i} style={S.uploadItem}><span>{x.title}</span></div>
                  ))}
                  {uploadPreview.kind === "events" && (uploadPreview.events || []).map((x, i) => (
                    <div key={i} style={S.uploadItem}><span>{x.title}</span><span style={S.uploadAmount}>{x.startTime ? x.startTime + " · " : ""}{x.due ? fmtHe(x.due) : ""}</span></div>
                  ))}
                </div>
                <div style={S.uploadBtns}>
                  <button style={S.uploadConfirm} onClick={confirmUpload}>✓ אשר והכנס למערכת</button>
                  <button style={S.uploadCancel} onClick={() => setUploadPreview(null)}>ביטול</button>
                </div>
              </div>
            )}

            {coachThread.length > 0 && (
              <button style={S.coachReset} onClick={clearCoachThread}>נקה שיחה</button>
            )}
          </section>

          {/* ===== מבט-על חווה (שירת האדמה) ===== */}
          {farmReady && (
            <section style={S.farmCard}>
              <div style={S.farmCardHead}>
                <span style={S.farmCardTitle}>🌾 שירת האדמה · מבט-על</span>
                <button style={S.farmRefresh} disabled={farmReadBusy} onClick={readFarm}>
                  {farmReadBusy ? "טוען…" : "↻ רענן"}
                </button>
              </div>

              {!farmLoaded ? (
                <div style={S.farmEmpty}>טוען מהחווה…</div>
              ) : farmTasks.length === 0 ? (
                <div style={S.farmEmpty}>אין משימות פתוחות בחווה כרגע ✓</div>
              ) : (
                <React.Fragment>
                  {/* שורת סטטוס */}
                  <div style={S.farmStats}>
                    <div style={S.farmStat}><div style={S.farmStatNum}>{farmTasks.length}</div><div style={S.farmStatLbl}>פתוחות</div></div>
                    <div style={S.farmStat}><div style={{ ...S.farmStatNum, color: farmStale.length ? C.danger : C.good }}>{farmStale.length}</div><div style={S.farmStatLbl}>תקועות</div></div>
                    <div style={S.farmStat}><div style={S.farmStatNum}>{Object.keys(farmByOwner).length}</div><div style={S.farmStatLbl}>אנשים</div></div>
                  </div>

                  {/* התרעת תקיעות */}
                  {farmStale.length > 0 && (
                    <div style={S.farmAlert}>
                      🔴 {farmStale.length} {farmStale.length === 1 ? "משימה תקועה" : "משימות תקועות"} בחווה — הכי דחופה: {farmStale[0].title}
                    </div>
                  )}

                  {/* מי תקוע — לפי בעלים */}
                  <div style={S.farmOwnerTitle}>מי על מה:</div>
                  {Object.entries(farmByOwner).map(([who, list]) => (
                    <div key={who} style={S.farmOwnerRow}>
                      <div style={S.farmOwnerName}>{who} <span style={S.farmOwnerCount}>{list.length}</span></div>
                      <div style={S.farmOwnerTasks}>
                        {list.slice(0, 4).map((t, i) => (
                          <div key={i} style={S.farmTaskChip}>
                            {farmAreaLabel(t.area).split(" ")[0]} {t.title}
                          </div>
                        ))}
                        {list.length > 4 && <div style={S.farmMore}>ועוד {list.length - 4}…</div>}
                      </div>
                    </div>
                  ))}
                </React.Fragment>
              )}
            </section>
          )}

          {/* ===== תחומים — משימות מרוכזות לפי תחום ===== */}
          {areas.length > 0 && (
            <section style={S.areasCard}>
              <div style={S.areasHead}>
                <span style={S.areasTitle}>📁 התחומים שלי</span>
                <span style={S.areasHint}>לחץ לפתיחה</span>
              </div>
              {areas.map((a) => {
                const list = tasksByArea.map[a.id] || [];
                const overdue = list.filter((t) => t.due && daysUntil(t.due) < 0).length;
                return (
                  <div key={a.id} style={S.areaRow} onClick={() => setOpenArea(openArea === a.id ? null : a.id)}>
                    <div style={S.areaRowTop}>
                      <span style={S.areaName}>📁 {a.name}</span>
                      <span style={S.areaCount}>
                        {list.length} {list.length === 1 ? "פתוחה" : "פתוחות"}
                        {overdue > 0 && <span style={S.areaOverdue}> · {overdue} באיחור</span>}
                      </span>
                    </div>
                    {openArea === a.id && (
                      <div style={S.areaTasks}>
                        {list.length === 0 ? (
                          <div style={S.areaEmpty}>אין משימות פתוחות בתחום הזה ✓</div>
                        ) : (
                          list.map((t) => (
                            <div key={t.id} style={S.areaTask} onClick={(e) => { e.stopPropagation(); setStatus(t.id, "done"); }}>
                              <span style={S.areaTaskCheck}>○</span>
                              <span style={S.areaTaskTitle}>{t.title}</span>
                              {t.due && <span style={{ ...S.areaTaskDue, color: daysUntil(t.due) < 0 ? C.danger : C.dim }}>{fmtHe(t.due)}</span>}
                            </div>
                          ))
                        )}
                      </div>
                    )}
                  </div>
                );
              })}
            </section>
          )}

          {(() => {
            const todays = tasks.filter((t) => t.due === tk && t.status !== "done");
            if (todays.length === 0) return null;
            return (
              <section style={S.todayBanner}>
                <div style={S.todayBannerTop}>
                  <span style={S.todayBannerIcon}>📅</span>
                  <span style={S.todayBannerTitle}>היום יש לך {todays.length} {todays.length === 1 ? "משימה" : "משימות"}</span>
                </div>
                <div style={S.todayBannerList}>{todays.slice(0, 4).map((t) => t.title).join(" · ")}{todays.length > 4 ? " ועוד…" : ""}</div>
              </section>
            );
          })()}
          {checkedInDay === tk && focus.trim() && (
            <section style={S.focusLocked}>
              <div><div style={S.dimSmall}>המוקד שלך להיום</div><div style={S.focusText}>{focus}</div></div>
              <button style={S.btnGhost} onClick={() => setCheckedInDay(null)}>שנה</button>
            </section>
          )}

          <section style={S.weekCube}>
            <div style={S.weekHead}>
              <span style={S.weekTitle}>📅 השבוע</span>
              <span style={S.weekHint}>אדום חזק = יום עמוס</span>
            </div>
            <div style={S.weekRow}>
              {weekDays.map((d) => (
                <button key={d.iso} onClick={() => setCalDay(d.iso)}
                  style={{ ...S.weekDay, cursor: "pointer", background: loadColor(d.count), border: d.isToday ? "2px solid " + C.accent : "1px solid " + C.line }}>
                  <div style={{ ...S.weekDayName, color: loadText(d.count) }}>{d.dayName}</div>
                  <div style={{ ...S.weekDayNum, color: loadText(d.count) }}>{d.dayNum}</div>
                  {d.count > 0 && <div style={{ ...S.weekDayCount, color: loadText(d.count) }}>{d.count}</div>}
                </button>
              ))}
            </div>
          </section>

          <section style={S.hobbyRow}>
            {HOBBIES.map((h) => {
              const key = "hobby-" + h.id;
              const done = (habitLog[tk] || {})[key];
              return (
                <button key={h.id} onClick={() => toggleHabit(key)}
                  style={{ ...S.hobbyCube, borderColor: done ? h.color : C.line, background: done ? h.color + "14" : C.panel }}>
                  <div style={S.hobbyTop}>
                    <span style={S.hobbyEmoji}>{h.emoji}</span>
                    <span style={{ ...S.hobbyCheck, background: done ? h.color : "transparent", borderColor: done ? h.color : C.line, color: done ? "#fff" : "transparent" }}>✓</span>
                  </div>
                  <div style={{ ...S.hobbyLabel, color: h.color }}>{h.label}</div>

                  <span>🌾 משימת חווה — לשלוח לניהול החווה</span>
                </label>
                {editTask.isFarm && (
                  <div style={{ marginTop: 12 }}>
                    <label style={S.editLabel}>אזור בחווה</label>
                    <div style={S.editChips}>
                      {FARM_AREAS.map(([v, l]) => (
                        <button key={v} onClick={() => setEditTask({ ...editTask, farmArea: v })}
                          style={{ ...S.editChip, ...(editTask.farmArea === v ? { background: C.accent2, color: "#ffffff", borderColor: C.accent2 } : {}) }}>{l}</button>
                      ))}
                    </div>
                    <label style={S.editLabel}>שעה (אופציונלי)</label>
                    <input type="time" style={S.editInput} value={editTask.farmTime || ""}
                      onChange={(e) => setEditTask({ ...editTask, farmTime: e.target.value })} />
                    <button style={{ ...S.btnAccent, width: "100%", marginTop: 14, opacity: farmSending ? 0.6 : 1 }}
                      disabled={farmSending} onClick={sendToFarm}>
                      {farmSending ? "שולח…" : "🌾 שלח לחווה"}
                    </button>
                    {editTask.sentToFarm && <div style={S.farmSent}>✓ כבר נשלחה לחווה</div>}
                  </div>
                )}
              </div>
            )}
            <div style={{ ...S.modalBtns, marginTop: 20 }}>
              <button style={S.btnAccent} onClick={saveEdit}>שמור</button>
              <button style={S.btnGhost} onClick={closeEdit}>ביטול</button>
              <button style={S.deleteBtn} onClick={deleteTask}>מחק</button>
            </div>
          </div>
        </div>
      )}

      {/* ===== סיור ראשוני — אולגה מציגה את עצמה ===== */}
      {showTour && (
        <div style={S.ritualWrap}>
          <div style={S.ritualModal}>
            <h2 style={S.ritualTitle}>🌻 נעים מאוד, אני אולגה</h2>
            <div style={S.ritualBody}>
              אני העוזרת האישית שלך, בני. הנה מה שאני יכולה לעשות בשבילך:
            </div>
            <div style={S.tourList}>
              {CAPABILITIES.slice(0, 6).map((c) => (
                <div key={c.id} style={S.tourItem}>
                  <span style={S.tourEmoji}>{c.emoji}</span>
                  <div><div style={S.tourItemTitle}>{c.title}</div></div>
                </div>
              ))}
            </div>
            <div style={S.ritualBody}>
              לא צריך לזכור הכל — אני אזכיר לך טיפ אחד כל יום, ואדחוף אותך להשתמש במה שיעזור.
            </div>
            <button style={S.ritualNextBtn} onClick={() => { setShowTour(false); setTourSeen(true); }}>
              יאללה, בוא נתחיל
            </button>
          </div>
        </div>
      )}

      {/* ===== מודל טקס בוקר ===== */}
      {ritualOpen && (() => {
        const step = ritualSteps[ritualStep];
        const isLast = ritualStep === ritualSteps.length - 1;
        const meetingsToday = tasks.filter((t) => t.due === tk && t.startTime && t.status !== "done");
        const eventsToday = tasks.filter((t) => t.due === tk && t.status !== "done");
        return (
          <div style={S.ritualWrap}>
            <div style={S.ritualModal}>
              <div style={S.ritualProgress}>
                {ritualSteps.map((_, i) => (
                  <div key={i} style={{ ...S.ritualDot, background: i <= ritualStep ? "#c9764f" : "rgba(243,236,220,0.25)" }} />
                ))}
              </div>

              <h2 style={S.ritualTitle}>{step.title}</h2>

              {/* תוכן השלב */}
              {step.key === "meetings" ? (
                <div style={S.ritualBody}>
                  {eventsToday.length === 0
                    ? "היומן שלך פנוי היום. דף חלק — אתה מחליט מה ממלא אותו."
                    : "זה מה שכבר קבוע היום:"}
                  {eventsToday.length > 0 && (
                    <div style={S.ritualMeetings}>
                      {eventsToday.map((m) => (
                        <div key={m.id} style={S.ritualMeeting}>
                          {m.startTime ? "🕐 " + m.startTime + " · " : "• "}{m.title}
                        </div>
                      ))}
                    </div>
                  )}
                </div>
              ) : (
                <div style={S.ritualBody}>{step.body}</div>
              )}

              {/* שדה קלט אם יש */}
              {step.field && (
                <textarea style={S.ritualInput} rows={step.field === "mits" ? 4 : 2}
                  value={ritualGetField(step.field)}
                  onChange={(e) => ritualSetField(step.field, e.target.value)}
                  placeholder={step.placeholder} />
              )}
              {step.field && <div style={S.ritualHint}>💡 טיפ: לחץ על מקש המיקרופון 🎤 במקלדת כדי לדבר במקום להקליד</div>}

              {/* כפתורי ניווט */}
              <div style={S.ritualNav}>
                <button style={S.ritualNextBtn} onClick={ritualNext}>
                  {isLast ? "✓ סיים והתחל את היום" : "המשך →"}
                </button>
                {!isLast && ritualStep < 4 && (
                  <button style={S.ritualSkip} onClick={ritualSkipToPlan}>דלג לתכנון ←</button>
                )}
              </div>
              <button style={S.ritualClose} onClick={() => setRitualOpen(false)}>סגור</button>
            </div>
          </div>
        );
      })()}

      {toast && <div style={S.toast}>{toast}</div>}
      <footer style={S.footer}>{firebaseReady ? "מחובר ל-Firebase · הנתונים נשמרים." : "מצב מקומי — חבר Firebase לשמירה קבועה (ראה מדריך)."}</footer>
    </div>
  );
}

function Stat({ label, value, accent }) {
  return <div style={S.stat}><div style={{ ...S.statValue, color: accent ? C.accent : C.text }}>{value}</div><div style={S.statLabel}>{label}</div></div>;
}
function SectionTitle({ children }) { return <div style={S.sectionTitle}>{children}</div>; }
function PatCard({ num, title, body, color, accent }) {
  return (
    <div style={{ ...S.patCard, borderColor: accent ? color : C.line, background: accent ? "rgba(0,200,117,0.1)" : C.panel }}>

    </div>
  );
}
