<script type="text/babel" data-presets="react">
const { useState, useEffect, useMemo } = React;

/* ---------- אתחול Firebase ---------- */
let db = null, firebaseReady = false;
try {
  if (window.FIREBASE_CONFIG && window.FIREBASE_CONFIG.projectId !== "PASTE_PROJECT") {
    firebase.initializeApp(window.FIREBASE_CONFIG);
    db = firebase.firestore();
    firebaseReady = true;
  }
} catch (e) { console.warn("Firebase init failed:", e); }

const DOC_REF = () => db.collection("ozeret").doc("main");

// Firestore שומר מערכים לפעמים כאובייקט — נרמול חזרה למערך
function bonusArr(v) {
  if (Array.isArray(v)) return v;
  if (v && typeof v === "object") return Object.keys(v).sort().map((k) => v[k]);
  return [];
}

/* ---------- צבעים ---------- */
const C = {
  bg: "#1d2419", panel: "#262e20", panel2: "#2f3829", line: "#3d4733",
  text: "#eae6d8", dim: "#a3a08f", accent: "#c97b40", accent2: "#7a8b4f",
  good: "#8aa05a", warn: "#d4904a", danger: "#c4634a",
};

const todayKey = () => new Date().toISOString().slice(0, 10);
const fmtHe = (d) => new Date(d).toLocaleDateString("he-IL", { day: "numeric", month: "numeric" });
const daysUntil = (d) => Math.ceil((new Date(d + "T23:59:59") - new Date()) / 86400000);

const STATUS = {
  todo:  { label: "לעשות",  color: C.dim },
  doing: { label: "בתהליך", color: C.warn },
  done:  { label: "בוצע",   color: C.good },
};
const STATUS_ORDER = ["todo", "doing", "done"];

const SEED_TASKS = [
  { id: "t1", title: "למדוד חלונות ולהזמין מיד", due: "2026-06-13", cat: "טיסה", prio: "high", status: "todo", owner: "בני", steps: [], feedback: [] },
  { id: "t2", title: "לסגור פתחים במבנה", due: "2026-06-18", cat: "טיסה", prio: "high", status: "todo", owner: "צוות", steps: [], feedback: [] },
  { id: "t3", title: "ליישר רצפה", due: "2026-06-18", cat: "טיסה", prio: "high", status: "todo", owner: "צוות", steps: [], feedback: [] },
  { id: "t4", title: "לצבוע את המבנה", due: "2026-06-25", cat: "טיסה", prio: "med", status: "todo", owner: "צוות", steps: [], feedback: [] },
  { id: "t5", title: "להתחיל שירותי קומפוסט ומקלחת", due: "2026-06-25", cat: "טיסה", prio: "med", status: "todo", owner: "בני", steps: [], feedback: [] },
  { id: "t6", title: "לסיים שירותים ומקלחת", due: "2026-07-02", cat: "טיסה", prio: "med", status: "todo", owner: "בני", steps: [], feedback: [] },
  { id: "t7", title: "לנקות את המבנה", due: "2026-07-02", cat: "טיסה", prio: "med", status: "todo", owner: "הזוג", steps: [], feedback: [] },
  { id: "t8", title: "לסדר בחוץ", due: "2026-07-09", cat: "טיסה", prio: "med", status: "todo", owner: "הזוג", steps: [], feedback: [] },
  { id: "t9", title: "לסגור את היער", due: "2026-07-09", cat: "טיסה", prio: "med", status: "todo", owner: "בני", steps: [], feedback: [] },
];
const SEED_HABITS = [
  { id: "h1", title: "לקום ולצאת לאוויר", emoji: "☀️", note: "6:45 — אור בוקר, אספרסו בחוץ" },
  { id: "h2", title: "רבע שעה אימון מקל", emoji: "🥢", note: "15 דק׳ תנועה" },
  { id: "h3", title: "אימון חליל אירי", emoji: "🎵", note: "מחכה 3 שבועות — מתחילים!" },
];
const GREETINGS = [
  "בוקר טוב בני. מה במוקד היום?",
  "יאללה בני, יום חדש. על מה אתה הכי רוצה לסגור היום?",
  "בוקר. בלי לחשוב יותר מדי — מה הדבר האחד שחייב לקרות היום?",
];
const PRAISE = [
  "יפה מאוד. סימנת משימה — זה בדיוק המהלך.",
  "כל הכבוד בני. עוד אחת ירדה.",
  "זהו, ככה זה נראה. ממשיכים.",
];

/* ---------- קריאה ל-AI (דורשת מפתח של בני) ----------
   מחוץ לסביבת Claude צריך מפתח Anthropic. נשמר מקומית בדפדפן.
   אם אין מפתח — הפיצ'רים האלה מציגים הודעה מנומסת. */
async function callAI(prompt, apiKey) {
  if (!apiKey) throw new Error("no-key");
  const res = await fetch("https://api.anthropic.com/v1/messages", {
    method: "POST",
    headers: {
      "Content-Type": "application/json",
      "x-api-key": apiKey,
      "anthropic-version": "2023-06-01",
      "anthropic-dangerous-direct-browser-access": "true",
    },
    body: JSON.stringify({
      model: "claude-sonnet-4-6",
      max_tokens: 1000,
      messages: [{ role: "user", content: prompt }],
    }),
  });
  const data = await res.json();
  return data.content.filter((b) => b.type === "text").map((b) => b.text).join("").trim();
}

function App() {
  const [loaded, setLoaded] = useState(false);
  const [tab, setTab] = useState("home");
  const [tasks, setTasks] = useState(SEED_TASKS);
  const [habits] = useState(SEED_HABITS);
  const [habitLog, setHabitLog] = useState({});
  const [focus, setFocus] = useState("");
  const [checkedInDay, setCheckedInDay] = useState(null);
  const [breakingId, setBreakingId] = useState(null);
  const [busy, setBusy] = useState(false);
  const [newTask, setNewTask] = useState("");
  const [toast, setToast] = useState(null);
  const [voiceOn, setVoiceOn] = useState(true);
  const [spoke, setSpoke] = useState(false);
  const [fbTask, setFbTask] = useState(null);
  const [fbText, setFbText] = useState("");
  const [fbReply, setFbReply] = useState(null);
  const [fbBusy, setFbBusy] = useState(false);
  const [patterns, setPatterns] = useState(null);
  const [patBusy, setPatBusy] = useState(false);
  const [lastAnalyzedAt, setLastAnalyzedAt] = useState(0);
  const [apiKey, setApiKey] = useState("");
  const [showKey, setShowKey] = useState(false);

  const tk = todayKey();
  const greeting = useMemo(() => GREETINGS[new Date().getDate() % GREETINGS.length], []);
  const showToast = (m) => { setToast(m); setTimeout(() => setToast(null), 2800); };

  /* ----- טעינה ראשונית מ-Firebase ----- */
  useEffect(() => {
    const savedKey = (window.sessionStorage && sessionStorage.getItem("anthKey")) || "";
    if (savedKey) setApiKey(savedKey);
    if (!firebaseReady) { setLoaded(true); return; }
    DOC_REF().get().then((snap) => {
      if (snap.exists) {
        const d = snap.data();
        if (d.tasks) setTasks(bonusArr(d.tasks).map((t) => ({ ...t, steps: bonusArr(t.steps), feedback: bonusArr(t.feedback) })));
        if (d.habitLog) setHabitLog(d.habitLog);
        if (d.focus && d.focusDay === tk) { setFocus(d.focus); setCheckedInDay(tk); }
        if (typeof d.lastAnalyzedAt === "number") setLastAnalyzedAt(d.lastAnalyzedAt);
        if (d.patterns) setPatterns(d.patterns);
      }
      setLoaded(true);
    }).catch((e) => { console.warn(e); setLoaded(true); });
  }, []);

  /* ----- שמירה ל-Firebase בכל שינוי ----- */
  useEffect(() => {
    if (!loaded || !firebaseReady) return;
    const payload = {
      tasks, habitLog,
      focus: checkedInDay === tk ? focus : "",
      focusDay: checkedInDay === tk ? tk : "",
      lastAnalyzedAt, patterns: patterns || null,
      updatedAt: new Date().toISOString(),
    };
    DOC_REF().set(payload, { merge: true }).catch((e) => console.warn("save failed", e));
  }, [tasks, habitLog, focus, checkedInDay, patterns, lastAnalyzedAt, loaded]);

  const saveKey = (v) => {
    setApiKey(v);
    try { if (window.sessionStorage) sessionStorage.setItem("anthKey", v); } catch (e) {}
  };

  const openTasks = tasks.filter((t) => t.status !== "done");
  const doneCount = tasks.filter((t) => t.status === "done").length;
  const pct = Math.round((doneCount / tasks.length) * 100);
  const flightOpen = openTasks.filter((t) => t.cat === "טיסה");
  const nextTask = [...flightOpen].sort((a, b) => (a.due || "9").localeCompare(b.due || "9"))[0];
  const todayHabits = habitLog[tk] || {};
  const habitsDone = habits.filter((h) => todayHabits[h.id]).length;

  /* ----- קול ----- */
  const speak = (text) => {
    if (!("speechSynthesis" in window)) { showToast("הקול לא נתמך בדפדפן הזה"); return; }
    window.speechSynthesis.cancel();
    const u = new SpeechSynthesisUtterance(text);
    u.lang = "he-IL"; u.rate = 1; u.pitch = 1;
    const v = window.speechSynthesis.getVoices().find((x) => x.lang && x.lang.toLowerCase().startsWith("he"));
    if (v) u.voice = v;
    window.speechSynthesis.speak(u);
  };
  const stopSpeak = () => { if ("speechSynthesis" in window) window.speechSynthesis.cancel(); };

  const summaryText = useMemo(() => {
    const urgent = tasks.filter((t) => t.status !== "done" && t.due && daysUntil(t.due) <= 2);
    const p = ["בוקר טוב בני."];
    if (checkedInDay === tk && focus.trim()) p.push("המוקד שלך להיום: " + focus + ".");
    p.push("יש לך " + openTasks.length + " משימות פתוחות, השלמת " + doneCount + ", אתה ב-" + pct + " אחוז.");
    p.push(urgent.length ? "דורש תשומת לב: " + urgent.map((t) => t.title).join(", ") + "." : "שום דבר לא בוער כרגע.");
    if (nextTask) p.push("הבא בתור: " + nextTask.title + ".");
    p.push("הרגלים היום: השלמת " + habitsDone + " מתוך " + habits.length + ".");
    p.push("יאללה, צעד אחד קדימה.");
    return p.join(" ");
  }, [tasks, focus, checkedInDay, tk, openTasks.length, doneCount, pct, nextTask, habitsDone, habits.length]);

  useEffect(() => {
    if (!voiceOn || spoke || !loaded) return;
    const id = setTimeout(() => {
      if ("speechSynthesis" in window && window.speechSynthesis.getVoices().length === 0) {
        window.speechSynthesis.onvoiceschanged = () => speak(summaryText);
      } else speak(summaryText);
      setSpoke(true);
    }, 800);
    return () => clearTimeout(id);
  }, [loaded]);

  /* ----- פעולות משימה ----- */
  const setStatus = (id, status) => {
    setTasks((prev) => prev.map((t) => (t.id === id ? { ...t, status } : t)));
    if (status === "done") showToast(PRAISE[Math.floor(Math.random() * PRAISE.length)]);
  };
  const advance = (t) => { const i = STATUS_ORDER.indexOf(t.status); setStatus(t.id, STATUS_ORDER[Math.min(i + 1, 2)]); };
  const toggleHabit = (id) => setHabitLog((p) => { const d = { ...(p[tk] || {}) }; d[id] = !d[id]; return { ...p, [tk]: d }; });
  const addTask = () => {
    const v = newTask.trim(); if (!v) return;
    setTasks((p) => [...p, { id: "u" + Date.now(), title: v, due: "", cat: "כללי", prio: "med", status: "todo", owner: "בני", steps: [], feedback: [] }]);
    setNewTask(""); showToast("נוסף. תפרק אותו אם הוא גדול.");
  };
  const checkIn = () => { if (!focus.trim()) return; setCheckedInDay(tk); showToast("מצוין. עכשיו הצעד הראשון."); };

  const breakDown = async (task) => {
    setBreakingId(task.id); setBusy(true);
    try {
      const text = await callAI(
        'אתה עוזר אישי ישיר ומדרבן של בני, מנהל חווה חינוכית בישראל.\n' +
        'פרק את המשימה ל-3 עד 5 צעדים קטנים וקונקרטיים בעברית, כל צעד מתחיל בפועל בציווי, קצר.\n' +
        'החזר JSON בלבד: {"steps":["...","..."]}\nמשימה: "' + task.title + '"', apiKey);
      const parsed = JSON.parse(text.replace(/```json|```/g, "").trim());
      const steps = (parsed.steps || []).map((s, i) => ({ id: task.id + "-s" + i, text: s, done: false }));
      setTasks((p) => p.map((t) => (t.id === task.id ? { ...t, steps } : t)));
    } catch (e) {
      showToast(e.message === "no-key" ? "צריך מפתח AI — פתח 'חיבור AI' למטה" : "לא הצלחתי לפרק כרגע.");
    } finally { setBusy(false); setBreakingId(null); }
  };
  const toggleStep = (taskId, stepId) =>
    setTasks((p) => p.map((t) => t.id === taskId ? { ...t, steps: t.steps.map((s) => s.id === stepId ? { ...s, done: !s.done } : s) } : t));

  /* ----- משוב ----- */
  const openFeedback = (task) => { setFbTask(task); setFbText(""); setFbReply(null); };
  const closeFeedback = () => { setFbTask(null); setFbText(""); setFbReply(null); };
  const sendFeedback = async () => {
    if (!fbText.trim() || !fbTask) return;
    setFbBusy(true); setFbReply(null);
    const history = bonusArr(fbTask.feedback);
    const histText = history.length ? "היסטוריה: " + history.map((h) => "(" + h.date + ") " + h.note).join(" | ") : "אין היסטוריה קודמת.";
    try {
      const text = await callAI(
        'אתה עוזר אישי של בני, מנהל חווה חינוכית בישראל. אתה ישיר ומדרבן.\n' +
        'בני סיים משימה ורוצה משוב. תן משוב שמשלב: 1. עידוד אמיתי (לא מתחנף). 2. ניתוח קונקרטי — מה לא עבד, למה, ואיך לשפר (צעד מעשי).\n' +
        'קצר, בעברית, גוף שני, 3-5 משפטים, בלי כותרות.\n' +
        'המשימה: "' + fbTask.title + '"\nמה בני כתב: "' + fbText + '"\n' + histText, apiKey);
      setFbReply(text);
      const entry = { date: todayKey(), note: fbText.trim(), reply: text };
      setTasks((p) => p.map((t) => t.id === fbTask.id ? { ...t, feedback: [...bonusArr(t.feedback), entry] } : t));
    } catch (e) {
      setFbReply(e.message === "no-key" ? "צריך מפתח AI כדי לקבל משוב. פתח 'חיבור AI' בתחתית המסך." : "לא הצלחתי כרגע. נסה שוב.");
    } finally { setFbBusy(false); }
  };

  /* ----- ניתוח דפוסים ----- */
  const allFeedback = useMemo(() => {
    const arr = [];
    tasks.forEach((t) => bonusArr(t.feedback).forEach((f) => arr.push({ task: t.title, cat: t.cat, ...f })));
    return arr;
  }, [tasks]);

  const analyzePatterns = async (count) => {
    setPatBusy(true);
    try {
      const list = allFeedback.map((f) => 'משימה: "' + f.task + '" (סוג: ' + f.cat + ') | בני כתב: "' + f.note + '"').join("\n");
      const text = await callAI(
        'אתה עוזר אישי של בני, מנהל חווה חינוכית. ישיר, חם ומדרבן.\n' +
        'נתח את הדפוסים החוזרים במשובים. החזר JSON בלבד (עברית, גוף שני):\n' +
        '{"byType":"דפוסים לפי סוג משימה","rootCause":"הסיבה העיקרית לתקיעות","oneChange":"השינוי האחד הכי משפיע","trend":"התקדמות לאורך זמן"}\n' +
        'אם אין מספיק נתונים, כתוב בכנות שצריך עוד משובים.\n\nהמשובים:\n' + list, apiKey);
      setPatterns(JSON.parse(text.replace(/```json|```/g, "").trim()));
      setLastAnalyzedAt(count);
    } catch (e) {
      setPatterns({ error: e.message === "no-key" ? "צריך מפתח AI לניתוח. פתח 'חיבור AI' בתחתית." : "לא הצלחתי לנתח כרגע." });
    } finally { setPatBusy(false); }
  };

  useEffect(() => {
    const n = allFeedback.length;
    if (loaded && n >= 3 && n - lastAnalyzedAt >= 3 && !patBusy && apiKey) analyzePatterns(n);
  }, [allFeedback.length]);

  const prioColor = (p) => (p === "high" ? C.danger : p === "med" ? C.warn : C.dim);

  if (!loaded) return <div style={{ ...S.root, textAlign: "center", paddingTop: 80, color: C.dim }}>טוען…</div>;

  return (
    <div dir="rtl" style={S.root}>
      <header style={S.header}>
        <div>
          <div style={S.eyebrow}>העוזרת {firebaseReady ? "· מחוברת" : "· מקומית"}</div>
          <h1 style={S.h1}>שלום בני</h1>
        </div>
        <div style={S.statRow}>
          <Stat label="פתוחות" value={openTasks.length} />
          <Stat label="הושלמו" value={doneCount} accent />
          <Stat label="התקדמות" value={pct + "%"} />
        </div>
      </header>

      <div style={S.voiceBar}>
        <button style={S.voiceBtn} onClick={() => speak(summaryText)}>🔊 דבר אליי</button>
        <button style={S.voiceGhost} onClick={stopSpeak}>השתק</button>
        <label style={S.voiceToggle}>
          <input type="checkbox" checked={voiceOn} onChange={(e) => setVoiceOn(e.target.checked)} />
          <span>הקראה אוטומטית בכניסה</span>
        </label>
      </div>

      <nav style={S.tabs}>
        {[["home", "בית"], ["board", "לוח"], ["trip", "מצב טיול"], ["patterns", "דפוסים"]].map(([k, l]) => (
          <button key={k} onClick={() => setTab(k)} style={{ ...S.tab, ...(tab === k ? S.tabActive : {}) }}>{l}</button>
        ))}
      </nav>

      {tab === "home" && (
        <React.Fragment>
          {checkedInDay !== tk ? (
            <section style={S.checkin}>
              <div style={S.greeting}>{greeting}</div>
              <div style={S.checkinRow}>
                <input style={S.focusInput} value={focus} onChange={(e) => setFocus(e.target.value)}
                  placeholder="הדבר האחד שחייב לקרות היום…" onKeyDown={(e) => e.key === "Enter" && checkIn()} />
                <button style={S.btnAccent} onClick={checkIn}>נעל מוקד</button>
              </div>
            </section>
          ) : (
            <section style={S.focusLocked}>
              <div><div style={S.dimSmall}>המוקד שלך להיום</div><div style={S.focusText}>{focus}</div></div>
              <button style={S.btnGhost} onClick={() => setCheckedInDay(null)}>שנה</button>
            </section>
          )}

          <div style={S.grid} className="grid">
            <div>
              <SectionTitle>המשימות שלך</SectionTitle>
              {nextTask && (
                <div style={S.nextCard}>
                  <div style={S.dimSmall}>הבא בתור · הכי דחוף</div>
                  <div style={S.nextTitle}>{nextTask.title}</div>
                  <div style={S.nextMeta}>
                    {nextTask.due && (
                      <span style={{ color: daysUntil(nextTask.due) <= 2 ? C.danger : C.dim }}>
                        {daysUntil(nextTask.due) <= 0 ? "להיום!" : "עוד " + daysUntil(nextTask.due) + " ימים · " + fmtHe(nextTask.due)}
                      </span>
                    )}
                  </div>
                </div>
              )}
              <div style={S.addRow}>
                <input style={S.addInput} value={newTask} onChange={(e) => setNewTask(e.target.value)}
                  placeholder="הוסף משימה…" onKeyDown={(e) => e.key === "Enter" && addTask()} />
                <button style={S.btnAccent} onClick={addTask}>+</button>
              </div>
              <div style={S.taskList}>
                {openTasks.slice().sort((a, b) => (a.due || "9").localeCompare(b.due || "9")).map((t) => (
                  <div key={t.id} style={S.taskCard}>
                    <div style={S.taskHead}>
                      <button style={S.check} onClick={() => setStatus(t.id, "done")} aria-label="בוצע" />
                      <div style={{ flex: 1 }}>
                        <div style={S.taskTitle}>{t.title}</div>
                        <div style={S.taskMeta}>
                          <span style={{ ...S.pill, borderColor: prioColor(t.prio), color: prioColor(t.prio) }}>{t.cat}</span>
                          <span style={{ ...S.pill, borderColor: STATUS[t.status].color, color: STATUS[t.status].color }}>{STATUS[t.status].label}</span>
                          {t.due && <span style={S.dimSmall}>{daysUntil(t.due) <= 0 ? "להיום" : "עוד " + daysUntil(t.due) + " י׳ · " + fmtHe(t.due)}</span>}
                        </div>
                      </div>
                      <div style={S.taskActions}>
                        <button style={S.breakBtn} disabled={busy && breakingId === t.id} onClick={() => breakDown(t)}>
                          {busy && breakingId === t.id ? "מפרק…" : "פרק לצעדים"}
                        </button>
                        <button style={S.fbBtn} onClick={() => openFeedback(t)}>
                          תן משוב{bonusArr(t.feedback).length ? " (" + bonusArr(t.feedback).length + ")" : ""}
                        </button>
                      </div>
                    </div>
                    {bonusArr(t.steps).length > 0 && (
                      <div style={S.steps}>
                        {bonusArr(t.steps).map((s) => (
                          <button key={s.id} style={S.stepRow} onClick={() => toggleStep(t.id, s.id)}>
                            <span style={{ ...S.stepDot, background: s.done ? C.good : "transparent", borderColor: s.done ? C.good : C.line }} />
                            <span style={{ ...S.stepText, opacity: s.done ? 0.5 : 1, textDecoration: s.done ? "line-through" : "none" }}>{s.text}</span>
                          </button>
                        ))}
                      </div>
                    )}
                  </div>
                ))}
                {openTasks.length === 0 && <div style={S.empty}>הכל סגור. נשום רגע — מגיע לך.</div>}
              </div>
            </div>

            <div>
              <SectionTitle>הרגלים יומיים</SectionTitle>
              <div style={S.habitList}>
                {habits.map((h) => {
                  const done = !!todayHabits[h.id];
                  return (
                    <button key={h.id} onClick={() => toggleHabit(h.id)}
                      style={{ ...S.habitCard, borderColor: done ? C.good : C.line, background: done ? "rgba(138,160,90,0.12)" : C.panel }}>
                      <span style={S.habitEmoji}>{h.emoji}</span>
                      <span style={{ flex: 1, textAlign: "right" }}>
                        <div style={S.habitTitle}>{h.title}</div>
                        <div style={S.dimSmall}>{h.note}</div>
                      </span>
                      <span style={{ ...S.habitCheck, background: done ? C.good : "transparent", borderColor: done ? C.good : C.line }}>{done ? "✓" : ""}</span>
                    </button>
                  );
                })}
              </div>
              <div style={S.encourage}>
                {habitsDone === habits.length ? "כל ההרגלים סומנו היום. אלוף. 🔥"
                  : habitsDone === 0 ? "עוד לא התחלת היום. בחר אחד וצא לדרך."
                  : habitsDone + " מתוך " + habits.length + ". עוד קצת ואתה סוגר את היום."}
              </div>
            </div>
          </div>
        </React.Fragment>
      )}

      {tab === "board" && (
        <section style={{ marginTop: 24 }}>
          <SectionTitle>לוח משימות · גרור בין סטטוסים</SectionTitle>
          <div style={S.board} className="board">
            {STATUS_ORDER.map((st) => {
              const items = tasks.filter((t) => t.status === st);
              return (
                <div key={st} style={S.col} onDragOver={(e) => e.preventDefault()}
                  onDrop={(e) => { const id = e.dataTransfer.getData("id"); if (id) setStatus(id, st); }}>
                  <div style={{ ...S.colHead, color: STATUS[st].color }}>{STATUS[st].label} <span style={S.colCount}>{items.length}</span></div>
                  <div style={S.colBody}>
                    {items.map((t) => (
                      <div key={t.id} draggable onDragStart={(e) => e.dataTransfer.setData("id", t.id)}
                        style={{ ...S.boardCard, borderRightColor: prioColor(t.prio) }}>
                        <div style={S.boardTitle}>{t.title}</div>
                        <div style={S.boardMeta}>
                          <span style={S.ownerChip}>{t.owner}</span>
                          {t.due && <span style={{ fontSize: 11, color: daysUntil(t.due) <= 2 ? C.danger : C.dim }}>{fmtHe(t.due)}</span>}
                        </div>
                        <div style={S.boardBtns}>
                          {st !== "done" && <button style={S.miniBtn} onClick={() => advance(t)}>קדם ←</button>}
                          {st !== "todo" && <button style={S.miniBtnGhost} onClick={() => setStatus(t.id, "todo")}>החזר</button>}
                        </div>
                      </div>
                    ))}
                    {items.length === 0 && <div style={S.colEmpty}>ריק</div>}
                  </div>
                </div>
              );
            })}
          </div>
        </section>
      )}

      {tab === "trip" && (
        <section style={{ marginTop: 24 }}>
          <div style={S.tripHead}>
            <div><div style={S.eyebrow}>מצב טיול · הטיסה ב-10.7</div><h2 style={S.tripH2}>החווה מרחוק</h2></div>
            <div style={S.tripBig}>{pct}%</div>
          </div>
          <div style={S.progWrap}><div style={{ ...S.progBar, width: pct + "%" }} /></div>
          <div style={S.dimSmall}>{doneCount} מתוך {tasks.length} משימות נסגרו</div>

          <div style={{ marginTop: 22 }}>
            <SectionTitle>דורש את תשומת ליבך</SectionTitle>
            {tasks.filter((t) => t.status !== "done" && t.due && daysUntil(t.due) <= 2).length === 0 ? (
              <div style={S.calm}>הכל רגוע. שום דבר בוער כרגע — תיהנה מהטיול. 🌅</div>
            ) : (
              tasks.filter((t) => t.status !== "done" && t.due && daysUntil(t.due) <= 2).map((t) => (
                <div key={t.id} style={S.tripAlert}>
                  <div><div style={S.taskTitle}>{t.title}</div><div style={S.dimSmall}>{t.owner} · {daysUntil(t.due) <= 0 ? "להיום" : "עוד " + daysUntil(t.due) + " ימים"}</div></div>
                  <div style={S.tripBtns}>
                    <button style={S.miniBtn} onClick={() => setStatus(t.id, "done")}>אשר בוצע</button>
                    <button style={S.miniBtnGhost} onClick={() => showToast("נשלחה דחיפה ל" + t.owner + " (יחובר לחווה בשלב הבא)")}>דחוף את {t.owner}</button>
                  </div>
                </div>
              ))
            )}
          </div>

          <div style={{ marginTop: 22 }}>
            <SectionTitle>מה זז · לפי בעלים</SectionTitle>
            {["בני", "צוות", "הזוג"].map((owner) => {
              const own = tasks.filter((t) => t.owner === owner);
              const od = own.filter((t) => t.status === "done").length;
              const op = own.length ? Math.round((od / own.length) * 100) : 0;
              return (
                <div key={owner} style={S.ownerRow}>
                  <span style={{ width: 50, fontWeight: 600 }}>{owner}</span>
                  <div style={S.ownerProgWrap}><div style={{ ...S.ownerProg, width: op + "%" }} /></div>
                  <span style={S.dimSmall}>{od}/{own.length}</span>
                </div>
              );
            })}
          </div>

          <div style={S.tripNote}>כרגע המעקב והתגובה פנימיים לעוזרת. בשלב הבא נחבר את זה ל<b>אתר ניהול החווה</b> כך שגיא ואליק יראו את הדחיפות שלך, ואתה תראה בזמן אמת מה הם סגרו — גם מהטיול.</div>
        </section>
      )}

      {tab === "patterns" && (
        <section style={{ marginTop: 24 }}>
          <div style={S.tripHead}>
            <div><div style={S.eyebrow}>למה אני נתקע</div><h2 style={S.tripH2}>הדפוסים שלך</h2></div>
            <div style={{ textAlign: "left" }}><div style={S.statValue}>{allFeedback.length}</div><div style={S.statLabel}>משובים נאספו</div></div>
          </div>
          {allFeedback.length < 3 && !patterns && (
            <div style={S.calm}>עדיין צריך עוד משובים. תן משוב על {3 - allFeedback.length} משימות נוספות והעוזרת תתחיל לזהות את הדפוסים שלך אוטומטית.</div>
          )}
          {patBusy && <div style={S.calm}>מנתחת את הדפוסים שלך…</div>}
          {patterns && patterns.error && <div style={S.tripAlert}><div>{patterns.error}</div></div>}
          {patterns && !patterns.error && (
            <div style={S.patWrap}>
              <PatCard num="01" title="דפוסים לפי סוג משימה" body={patterns.byType} color={C.accent} />
              <PatCard num="02" title="הסיבה העיקרית לתקיעות" body={patterns.rootCause} color={C.warn} />
              <PatCard num="03" title="השינוי האחד הכי משפיע" body={patterns.oneChange} color={C.good} accent />
              <PatCard num="04" title="התקדמות לאורך זמן" body={patterns.trend} color={C.accent2} />
            </div>
          )}
          {allFeedback.length >= 3 && (
            <button style={{ ...S.btnGhost, marginTop: 18 }} disabled={patBusy} onClick={() => analyzePatterns(allFeedback.length)}>
              {patBusy ? "מנתחת…" : "נתח מחדש עכשיו"}
            </button>
          )}
          <div style={S.tripNote}>הניתוח מתעדכן אוטומטית כל 3 משובים חדשים. ככל שתתעד יותר, התמונה תהיה מדויקת ואישית יותר.</div>
        </section>
      )}

      {/* חיבור AI */}
      <div style={S.keyBox}>
        <button style={S.keyToggle} onClick={() => setShowKey(!showKey)}>
          {showKey ? "▾" : "▸"} חיבור AI {apiKey ? "· מחובר ✓" : "· לא מחובר"}
        </button>
        {showKey && (
          <div style={{ marginTop: 12 }}>
            <div style={S.dimSmall}>הדבק מפתח Anthropic API להפעלת פירוק משימות, משוב וניתוח דפוסים. נשמר רק בדפדפן שלך.</div>
            <div style={{ display: "flex", gap: 8, marginTop: 10 }}>
              <input type="password" style={S.addInput} value={apiKey} onChange={(e) => saveKey(e.target.value)} placeholder="sk-ant-..." />
            </div>
          </div>
        )}
      </div>

      {fbTask && (
        <div style={S.modalWrap} onClick={closeFeedback}>
          <div style={S.modal} onClick={(e) => e.stopPropagation()} dir="rtl">
            <div style={S.modalHead}>
              <div><div style={S.dimSmall}>משוב על המשימה</div><div style={S.modalTitle}>{fbTask.title}</div></div>
              <button style={S.modalX} onClick={closeFeedback}>✕</button>
            </div>
            {!fbReply && (
              <React.Fragment>
                <div style={S.modalQ}>איך היה? מה עבד, מה פחות?</div>
                <textarea style={S.modalTextarea} value={fbText} onChange={(e) => setFbText(e.target.value)} rows={4}
                  placeholder="לדוגמה: ניגנתי 10 דקות אבל האצבעות לא הקשיבו, נתקעתי באותו קטע…" />
                <button style={S.btnAccent} disabled={fbBusy || !fbText.trim()} onClick={sendFeedback}>{fbBusy ? "חושבת…" : "קבל משוב"}</button>
              </React.Fragment>
            )}
            {fbReply && (
              <React.Fragment>
                <div style={S.replyBox}>{fbReply}</div>
                <div style={S.modalBtns}>
                  <button style={S.btnGhost} onClick={() => { setFbReply(null); setFbText(""); }}>עוד משוב</button>
                  <button style={S.btnAccent} onClick={closeFeedback}>סגור</button>
                </div>
              </React.Fragment>
            )}
            {bonusArr(fbTask.feedback).length > 0 && (
              <div style={S.histWrap}>
                <div style={S.dimSmall}>פעמים קודמות</div>
                {bonusArr(fbTask.feedback).slice().reverse().map((h, i) => (
                  <div key={i} style={S.histRow}><span style={S.histDate}>{fmtHe(h.date)}</span><span style={S.histNote}>{h.note}</span></div>
                ))}
              </div>
            )}
          </div>
        </div>
      )}

      {toast && <div style={S.toast}>{toast}</div>}
      <footer style={S.footer}>{firebaseReady ? "מחובר ל-Firebase · הנתונים נשמרים." : "מצב מקומי — חבר Firebase לשמירה קבועה (ראה מדריך)."}</footer>
    </div>
  );
}

function Stat({ label, value, accent }) {
  return <div style={S.stat}><div style={{ ...S.statValue, color: accent ? C.accent : C.text }}>{value}</div><div style={S.statLabel}>{label}</div></div>;
}
function SectionTitle({ children }) { return <div style={S.sectionTitle}>{children}</div>; }
function PatCard({ num, title, body, color, accent }) {
  return (
    <div style={{ ...S.patCard, borderColor: accent ? color : C.line, background: accent ? "rgba(138,160,90,0.1)" : C.panel }}>
      <div style={{ ...S.patNum, color }}>{num}</div>
      <div style={{ flex: 1 }}><div style={{ ...S.patTitle, color }}>{title}</div><div style={S.patBody}>{body}</div></div>
    </div>
  );
}
