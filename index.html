/* ---------- קריאה ל-AI (דורשת מפתח של בני) ----------
   מחוץ לסביבת Claude צריך מפתח Anthropic. נשמר מקומית בדפדפן.
   אם אין מפתח — הפיצ'רים האלה מציגים הודעה מנומסת. */
async function callAI(prompt, apiKey) {
  if (!apiKey) throw new Error("no-key");
  const res = await fetch("https://api.anthropic.com/v1/messages", {
    method: "POST",
    headers: {
      "Content-Type": "application/json",
      "x-api-key": apiKey,
      "anthropic-version": "2023-06-01",
      "anthropic-dangerous-direct-browser-access": "true",
    },
    body: JSON.stringify({
      model: "claude-sonnet-4-6",
      max_tokens: 1000,
      messages: [{ role: "user", content: prompt }],
    }),
  });
  const data = await res.json();
  return data.content.filter((b) => b.type === "text").map((b) => b.text).join("").trim();
}

function App() {
  const [loaded, setLoaded] = useState(false);
  const [tab, setTab] = useState("home");
  const [tasks, setTasks] = useState(SEED_TASKS);
  const [habits] = useState(SEED_HABITS);
  const [habitLog, setHabitLog] = useState({});
  const [focus, setFocus] = useState("");
  const [checkedInDay, setCheckedInDay] = useState(null);
  const [breakingId, setBreakingId] = useState(null);
  const [busy, setBusy] = useState(false);
  const [newTask, setNewTask] = useState("");
  const [newTopic, setNewTopic] = useState("general");
  const [newRepeat, setNewRepeat] = useState("once");
  const [topicFilter, setTopicFilter] = useState("all");
  // יומן חודשי
  const [calMonth, setCalMonth] = useState(() => { const d = new Date(); return new Date(d.getFullYear(), d.getMonth(), 1); });
  const [calDay, setCalDay] = useState(null); // היום שנבחר (iso)
  const [calNewTask, setCalNewTask] = useState("");
  // סיכומים
  const [sumPeriod, setSumPeriod] = useState("day"); // day | week | month
  const [sumFeedback, setSumFeedback] = useState("");
  const [sumBusy, setSumBusy] = useState(false);
  const [toast, setToast] = useState(null);
  const [voiceOn, setVoiceOn] = useState(true);
  const [spoke, setSpoke] = useState(false);
  const [fbTask, setFbTask] = useState(null);
  const [fbText, setFbText] = useState("");
  const [fbReply, setFbReply] = useState(null);
  const [fbBusy, setFbBusy] = useState(false);
  const [patterns, setPatterns] = useState(null);
  const [patBusy, setPatBusy] = useState(false);
  const [lastAnalyzedAt, setLastAnalyzedAt] = useState(0);
  const [apiKey, setApiKey] = useState("");
  const [showKey, setShowKey] = useState(false);
  const [showAllTasks, setShowAllTasks] = useState(false);
  const [chatMsgs, setChatMsgs] = useState([]);
  const [chatInput, setChatInput] = useState("");
  const [chatBusy, setChatBusy] = useState(false);
  const [editTask, setEditTask] = useState(null);
  // טיימר פומודורו
  const [pomoMode, setPomoMode] = useState("work"); // work | break
  const [pomoLeft, setPomoLeft] = useState(25 * 60); // שניות
  const [pomoRunning, setPomoRunning] = useState(false);
  const [pomoCount, setPomoCount] = useState(0); // כמה סבבי עבודה הושלמו

  const tk = todayKey();
  const greeting = useMemo(() => GREETINGS[new Date().getDate() % GREETINGS.length], []);
  const showToast = (m) => { setToast(m); setTimeout(() => setToast(null), 2800); };

  /* ----- טעינה ראשונית מ-Firebase ----- */
  useEffect(() => {
    const savedKey = (window.localStorage && localStorage.getItem("anthKey")) || (window.sessionStorage && sessionStorage.getItem("anthKey")) || "";
    if (savedKey) setApiKey(savedKey);
    if (!firebaseReady) { setLoaded(true); return; }
    DOC_REF().get().then((snap) => {
      if (snap.exists) {
        const d = snap.data();
        if (d.tasks) setTasks(bonusArr(d.tasks).map((t) => ({ ...t, steps: bonusArr(t.steps), feedback: bonusArr(t.feedback) })));
        if (d.habitLog) setHabitLog(d.habitLog);
        if (d.focus && d.focusDay === tk) { setFocus(d.focus); setCheckedInDay(tk); }
        if (typeof d.lastAnalyzedAt === "number") setLastAnalyzedAt(d.lastAnalyzedAt);
        if (d.patterns) setPatterns(d.patterns);
      }
      setLoaded(true);
    }).catch((e) => { console.warn(e); setLoaded(true); });
  }, []);

  /* ----- שמירה ל-Firebase בכל שינוי ----- */
  useEffect(() => {
    if (!loaded || !firebaseReady) return;
    const payload = {
      tasks, habitLog,
      focus: checkedInDay === tk ? focus : "",
      focusDay: checkedInDay === tk ? tk : "",
      lastAnalyzedAt, patterns: patterns || null,
      updatedAt: new Date().toISOString(),
    };
    DOC_REF().set(payload, { merge: true }).catch((e) => console.warn("save failed", e));
  }, [tasks, habitLog, focus, checkedInDay, patterns, lastAnalyzedAt, loaded]);

  const saveKey = (v) => {
    setApiKey(v);
    try { if (window.localStorage) localStorage.setItem("anthKey", v); } catch (e) {}
  };

  // ----- טיק של טיימר פומודורו -----
  useEffect(() => {
    if (!pomoRunning) return;
    const id = setInterval(() => {
      setPomoLeft((prev) => {
        if (prev <= 1) {
          // נגמר הזמן — מעבר בין עבודה להפסקה
          const speak = (txt) => { try { if ("speechSynthesis" in window) { const u = new SpeechSynthesisUtterance(txt); u.lang = "he-IL"; speechSynthesis.speak(u); } } catch (e) {} };
          if (pomoMode === "work") {
            setPomoCount((c) => c + 1);
            setPomoMode("break");
            speak("כל הכבוד! סיימת סבב עבודה. קח הפסקה של חמש דקות.");
            showToast("🎉 סיימת סבב! קח הפסקה של 5 דקות.");
            return 5 * 60;
          } else {
            setPomoMode("work");
            speak("ההפסקה נגמרה. בוא נחזור לעבודה.");
            showToast("⏰ ההפסקה נגמרה — בחזרה לעבודה!");
            return 25 * 60;
          }
        }
        return prev - 1;
      });
    }, 1000);
    return () => clearInterval(id);
  }, [pomoRunning, pomoMode]);

  const pomoReset = () => { setPomoRunning(false); setPomoMode("work"); setPomoLeft(25 * 60); };
  const pomoFmt = (s) => String(Math.floor(s / 60)).padStart(2, "0") + ":" + String(s % 60).padStart(2, "0");

  const openTasks = tasks.filter((t) => t.status !== "done");
  const doneCount = tasks.filter((t) => t.status === "done").length;
  const pct = Math.round((doneCount / tasks.length) * 100);
  const flightOpen = openTasks.filter((t) => t.cat === "טיסה");
  const nextTask = [...flightOpen].sort((a, b) => (a.due || "9").localeCompare(b.due || "9"))[0];
  const todayHabits = habitLog[tk] || {};
  const habitsDone = habits.filter((h) => todayHabits[h.id]).length;

  // משימות להיום + דחופות (48 שעות) — למסך הבית הפשוט
  const sortedOpen = openTasks.slice().sort((a, b) => (a.due || "9").localeCompare(b.due || "9"));
  const todayTasks = sortedOpen.filter((t) => t.due && daysUntil(t.due) <= 2);
  const laterTasks = sortedOpen.filter((t) => !(t.due && daysUntil(t.due) <= 2));
  const homeTasksRaw = showAllTasks ? sortedOpen : todayTasks;
  const homeTasks = topicFilter === "all" ? homeTasksRaw : homeTasksRaw.filter((t) => (t.topic || "general") === topicFilter);

  // ----- יומן שבועי: שבעה ימים קדימה + עומס לכל יום -----
  const weekDayNames = ["א׳", "ב׳", "ג׳", "ד׳", "ה׳", "ו׳", "ש׳"];
  const isoOf = (d) => d.getFullYear() + "-" + String(d.getMonth() + 1).padStart(2, "0") + "-" + String(d.getDate()).padStart(2, "0");
  const buildWeek = () => {
    const out = [];
    const base = new Date();
    for (let i = 0; i < 7; i++) {
      const d = new Date(base);
      d.setDate(base.getDate() + i);
      const iso = isoOf(d);
      const count = openTasks.filter((t) => t.due === iso).length;
      out.push({ iso, count, dayName: weekDayNames[d.getDay()], dayNum: d.getDate(), isToday: i === 0 });
    }
    return out;
  };
  const weekDays = buildWeek();
  // עוצמת אדום לפי עומס: 0=אין, ועד 4+ עמוס מאוד
  const loadColor = (count) => {
    if (count <= 0) return C.panel2;
    if (count === 1) return "#fde0e4";
    if (count === 2) return "#f9b8c1";
    if (count === 3) return "#f2818f";
    return "#e2445c"; // 4+ עמוס מאוד
  };
  const loadText = (count) => (count >= 3 ? "#ffffff" : C.text);

  // ----- יומן חודשי -----
  const heMonths = ["ינואר", "פברואר", "מרץ", "אפריל", "מאי", "יוני", "יולי", "אוגוסט", "ספטמבר", "אוקטובר", "נובמבר", "דצמבר"];
  const tasksOnDay = (iso) => tasks.filter((t) => t.due === iso);
  const buildMonth = () => {
    const y = calMonth.getFullYear(), m = calMonth.getMonth();
    const first = new Date(y, m, 1);
    const startPad = first.getDay(); // 0=ראשון
    const daysInMonth = new Date(y, m + 1, 0).getDate();
    const cells = [];
    for (let i = 0; i < startPad; i++) cells.push(null);
    for (let d = 1; d <= daysInMonth; d++) {
      const iso = y + "-" + String(m + 1).padStart(2, "0") + "-" + String(d).padStart(2, "0");
      cells.push({ d, iso, count: tasksOnDay(iso).filter((t) => t.status !== "done").length, isToday: iso === tk });
    }
    return cells;
  };
  const addTaskOnDay = (iso) => {
    const v = calNewTask.trim(); if (!v) return;
    setTasks((p) => [...p, { id: "u" + Date.now(), title: v, due: iso, cat: "כללי", topic: "general", repeat: "once", prio: "med", status: "todo", owner: "בני", steps: [], feedback: [] }]);
    setCalNewTask(""); showToast("נוספה משימה לתאריך.");
  };

  // ----- סיכומים -----
  const periodStart = (period) => {
    const d = new Date(); d.setHours(0, 0, 0, 0);
    if (period === "day") return d;
    if (period === "week") { const x = new Date(d); x.setDate(d.getDate() - 6); return x; }
    const x = new Date(d); x.setDate(d.getDate() - 29); return x; // חודש = 30 יום אחורה
  };
  const buildSummary = (period) => {
    const start = periodStart(period);
    const inRange = (iso) => { if (!iso) return false; const dt = new Date(iso); return dt >= start; };
    // הושלמו בתקופה (לפי doneAt אם קיים, אחרת due)
    const done = tasks.filter((t) => t.status === "done" && (inRange(t.doneAt) || inRange(t.due)));
    const open = tasks.filter((t) => t.status !== "done");
    const overdue = open.filter((t) => t.due && daysUntil(t.due) < 0);
    // פילוח לפי נושא
    const byTopic = {};
    done.forEach((t) => { const k = t.topic || "general"; byTopic[k] = (byTopic[k] || 0) + 1; });
    // פילוח לפי בעלים (מי עשה מה)
    const byOwner = {};
    done.forEach((t) => { const k = t.owner || "בני"; byOwner[k] = (byOwner[k] || 0) + 1; });
    return { done, open, overdue, byTopic, byOwner };
  };
  const periodLabel = { day: "היום", week: "השבוע", month: "החודש" };

  /* ----- קול ----- */
  const speak = (text) => {
    if (!("speechSynthesis" in window)) { showToast("הקול לא נתמך בדפדפן הזה"); return; }
    window.speechSynthesis.cancel();
    const u = new SpeechSynthesisUtterance(text);
    u.lang = "he-IL"; u.rate = 1; u.pitch = 1;
    const v = window.speechSynthesis.getVoices().find((x) => x.lang && x.lang.toLowerCase().startsWith("he"));
    if (v) u.voice = v;
    window.speechSynthesis.speak(u);
  };
  const stopSpeak = () => { if ("speechSynthesis" in window) window.speechSynthesis.cancel(); };

  const summaryText = useMemo(() => {
    const urgent = tasks.filter((t) => t.status !== "done" && t.due && daysUntil(t.due) <= 2);
    const p = ["בוקר טוב בני."];
    if (checkedInDay === tk && focus.trim()) p.push("המוקד שלך להיום: " + focus + ".");
    p.push("יש לך " + openTasks.length + " משימות פתוחות, השלמת " + doneCount + ", אתה ב-" + pct + " אחוז.");
    p.push(urgent.length ? "דורש תשומת לב: " + urgent.map((t) => t.title).join(", ") + "." : "שום דבר לא בוער כרגע.");
    if (nextTask) p.push("הבא בתור: " + nextTask.title + ".");
    p.push("הרגלים היום: השלמת " + habitsDone + " מתוך " + habits.length + ".");
    p.push("יאללה, צעד אחד קדימה.");
    return p.join(" ");
  }, [tasks, focus, checkedInDay, tk, openTasks.length, doneCount, pct, nextTask, habitsDone, habits.length]);

  useEffect(() => {
    if (!voiceOn || spoke || !loaded) return;
    const id = setTimeout(() => {
      if ("speechSynthesis" in window && window.speechSynthesis.getVoices().length === 0) {
        window.speechSynthesis.onvoiceschanged = () => speak(summaryText);
      } else speak(summaryText);
      setSpoke(true);
    }, 800);
    return () => clearTimeout(id);
  }, [loaded]);

  /* ----- פעולות משימה ----- */
  const setStatus = (id, status) => {
    setTasks((prev) => prev.map((t) => (t.id === id ? { ...t, status } : t)));
    if (status === "done") showToast(PRAISE[Math.floor(Math.random() * PRAISE.length)]);
  };
  const advance = (t) => { const i = STATUS_ORDER.indexOf(t.status); setStatus(t.id, STATUS_ORDER[Math.min(i + 1, 2)]); };
  const toggleHabit = (id) => setHabitLog((p) => { const d = { ...(p[tk] || {}) }; d[id] = !d[id]; return { ...p, [tk]: d }; });
  const addTask = () => {
    const v = newTask.trim(); if (!v) return;
    setTasks((p) => [...p, { id: "u" + Date.now(), title: v, due: "", cat: "כללי", topic: newTopic, repeat: newRepeat, prio: "med", status: "todo", owner: "בני", steps: [], feedback: [] }]);
    setNewTask(""); showToast("נוסף. תפרק אותו אם הוא גדול.");
  };
  const checkIn = () => { if (!focus.trim()) return; setCheckedInDay(tk); showToast("מצוין. עכשיו הצעד הראשון."); };

  const breakDown = async (task) => {
    setBreakingId(task.id); setBusy(true);
    try {
      const text = await callAI(
        'אתה עוזר אישי ישיר ומדרבן של בני, מנהל חווה חינוכית בישראל.\n' +
        'פרק את המשימה ל-3 עד 5 צעדים קטנים וקונקרטיים בעברית, כל צעד מתחיל בפועל בציווי, קצר.\n' +
        'החזר JSON בלבד: {"steps":["...","..."]}\nמשימה: "' + task.title + '"', apiKey);
      const parsed = JSON.parse(text.replace(/```json|```/g, "").trim());
      const steps = (parsed.steps || []).map((s, i) => ({ id: task.id + "-s" + i, text: s, done: false }));
      setTasks((p) => p.map((t) => (t.id === task.id ? { ...t, steps } : t)));
    } catch (e) {
      showToast(e.message === "no-key" ? "צריך מפתח AI — פתח 'חיבור AI' למטה" : "לא הצלחתי לפרק כרגע.");
    } finally { setBusy(false); setBreakingId(null); }
  };
  const toggleStep = (taskId, stepId) =>
    setTasks((p) => p.map((t) => t.id === taskId ? { ...t, steps: t.steps.map((s) => s.id === stepId ? { ...s, done: !s.done } : s) } : t));

  // משוב AI על הסיכום
  const getSummaryFeedback = async () => {
    setSumBusy(true); setSumFeedback("");
    try {
      const s = buildSummary(sumPeriod);
      const topicLines = Object.entries(s.byTopic).map(([k, n]) => topicOf(k).label + ": " + n).join(", ") || "אין";
      const ownerLines = Object.entries(s.byOwner).map(([k, n]) => k + ": " + n).join(", ") || "אין";
      const prompt =
        'אתה אולגה — עוזרת אישית חמה, ישירה ומדרבנת של בני, מנהל חווה חינוכית בישראל.\n' +
        'הנה סיכום הפעילות של ' + periodLabel[sumPeriod] + ':\n' +
        '- משימות שהושלמו: ' + s.done.length + '\n' +
        '- משימות פתוחות: ' + s.open.length + '\n' +
        '- משימות באיחור: ' + s.overdue.length + '\n' +
        '- הושלמו לפי נושא: ' + topicLines + '\n' +
        '- מי ביצע: ' + ownerLines + '\n\n' +
        'תן משוב קצר (3-4 משפטים) בעברית: מה הלך טוב, על מה לשים לב, והמלצה אחת קונקרטית להמשך. דברי בגוף ראשון, חם אבל כן.';
      const text = await callAI(prompt, apiKey);
      setSumFeedback(text);
    } catch (e) {
      setSumFeedback(e.message === "no-key" ? "צריך מפתח AI — פתח 'חיבור AI' בתחתית מסך הבית." : "לא הצלחתי לנתח כרגע. נסה שוב.");
    } finally { setSumBusy(false); }
  };

  /* ----- משוב ----- */
  const openFeedback = (task) => { setFbTask(task); setFbText(""); setFbReply(null); };
  const closeFeedback = () => { setFbTask(null); setFbText(""); setFbReply(null); };
  const sendFeedback = async () => {
    if (!fbText.trim() || !fbTask) return;
    setFbBusy(true); setFbReply(null);
    const history = bonusArr(fbTask.feedback);
    const histText = history.length ? "היסטוריה: " + history.map((h) => "(" + h.date + ") " + h.note).join(" | ") : "אין היסטוריה קודמת.";
    try {
      const text = await callAI(
        'אתה עוזר אישי של בני, מנהל חווה חינוכית בישראל. אתה ישיר ומדרבן.\n' +
        'בני סיים משימה ורוצה משוב. תן משוב שמשלב: 1. עידוד אמיתי (לא מתחנף). 2. ניתוח קונקרטי — מה לא עבד, למה, ואיך לשפר (צעד מעשי).\n' +
        'קצר, בעברית, גוף שני, 3-5 משפטים, בלי כותרות.\n' +
        'המשימה: "' + fbTask.title + '"\nמה בני כתב: "' + fbText + '"\n' + histText, apiKey);
      setFbReply(text);
      const entry = { date: todayKey(), note: fbText.trim(), reply: text };
      setTasks((p) => p.map((t) => t.id === fbTask.id ? { ...t, feedback: [...bonusArr(t.feedback), entry] } : t));
    } catch (e) {
      setFbReply(e.message === "no-key" ? "צריך מפתח AI כדי לקבל משוב. פתח 'חיבור AI' בתחתית המסך." : "לא הצלחתי כרגע. נסה שוב.");
    } finally { setFbBusy(false); }
  };

  /* ----- ניתוח דפוסים ----- */
  const allFeedback = useMemo(() => {
    const arr = [];
    tasks.forEach((t) => bonusArr(t.feedback).forEach((f) => arr.push({ task: t.title, cat: t.cat, ...f })));
    return arr;
  }, [tasks]);

  const analyzePatterns = async (count) => {
    setPatBusy(true);
    try {
      const list = allFeedback.map((f) => 'משימה: "' + f.task + '" (סוג: ' + f.cat + ') | בני כתב: "' + f.note + '"').join("\n");
      const text = await callAI(
        'אתה עוזר אישי של בני, מנהל חווה חינוכית. ישיר, חם ומדרבן.\n' +
        'נתח את הדפוסים החוזרים במשובים. החזר JSON בלבד (עברית, גוף שני):\n' +
        '{"byType":"דפוסים לפי סוג משימה","rootCause":"הסיבה העיקרית לתקיעות","oneChange":"השינוי האחד הכי משפיע","trend":"התקדמות לאורך זמן"}\n' +
        'אם אין מספיק נתונים, כתוב בכנות שצריך עוד משובים.\n\nהמשובים:\n' + list, apiKey);
      setPatterns(JSON.parse(text.replace(/```json|```/g, "").trim()));
      setLastAnalyzedAt(count);
    } catch (e) {
      setPatterns({ error: e.message === "no-key" ? "צריך מפתח AI לניתוח. פתח 'חיבור AI' בתחתית." : "לא הצלחתי לנתח כרגע." });
    } finally { setPatBusy(false); }
  };

  useEffect(() => {
    const n = allFeedback.length;
    if (loaded && n >= 3 && n - lastAnalyzedAt >= 3 && !patBusy && apiKey) analyzePatterns(n);
  }, [allFeedback.length]);

  // ----- צ'אט עם AI (שיחתי — שואל שאלות, מפצל לפרויקט) -----
  const sendChat = async () => {
    const msg = chatInput.trim();
    if (!msg || chatBusy) return;
    setChatInput("");
    const newHistory = [...chatMsgs, { role: "user", text: msg }];
    setChatMsgs(newHistory);
    setChatBusy(true);
    try {
      // בונים תמליל שיחה לקונטקסט
      const convo = newHistory.map((m) => (m.role === "user" ? "בני: " : "עוזרת: ") + m.text).join("\n");
      const text = await callAI(
        'אתה העוזר האישי של בני, מנהל חווה חינוכית בישראל. ישיר, חם ומדרבן.\n' +
        'נהל שיחה: כשבני מעלה משימה או מטרה, קודם שאל 1-2 שאלות הבהרה (למשל פנים או חוץ? מתי צריך? כמה גדול?) לפני שאתה מוסיף משהו. רק אחרי שיש לך מספיק מידע — הוסף.\n' +
        'אם מדובר במשהו גדול — פצל לפרויקט עם תת-משימות והצע תאריך יעד.\n' +
        'החזר JSON בלבד במבנה:\n' +
        '{"reply":"תשובה/שאלה קצרה בעברית","needMoreInfo":true/false,"addTask":"כותרת או ריק","subtasks":["תת-משימה","..."],"suggestedDue":"YYYY-MM-DD או ריק","ideas":["מה צריך","..."]}\n' +
        'כל עוד needMoreInfo=true — אל תוסיף משימה (addTask ריק), רק שאל.\n' +
        'התאריך היום הוא ' + tk + '.\n\n' +
        'השיחה עד כה:\n' + convo, apiKey);
      const parsed = JSON.parse(text.replace(/```json|```/g, "").trim());
      let added = null;
      if (parsed.addTask && parsed.addTask.trim() && !parsed.needMoreInfo) {
        const subs = (parsed.subtasks || []).map((s, i) => ({ id: "p" + Date.now() + "-" + i, text: s, done: false }));
        added = {
          id: "c" + Date.now(),
          title: parsed.addTask.trim(),
          due: parsed.suggestedDue && /^\d{4}-\d{2}-\d{2}$/.test(parsed.suggestedDue) ? parsed.suggestedDue : "",
          cat: subs.length ? "פרויקט" : "כללי",
          prio: "med", status: "todo", owner: "בני",
          steps: subs, feedback: [],
        };
        setTasks((p) => [...p, added]);
      }
      setChatMsgs((p) => [...p, {
        role: "ai", text: parsed.reply || "",
        ideas: parsed.ideas || [],
        added: added ? added.title : null,
        addedDue: added && added.due ? added.due : null,
        subCount: added ? added.steps.length : 0,
      }]);
    } catch (e) {
      setChatMsgs((p) => [...p, { role: "ai", text: e.message === "no-key" ? "צריך מפתח AI — פתח 'חיבור AI' בתחתית." : "לא הצלחתי כרגע. נסה שוב." }]);
    } finally { setChatBusy(false); }
  };
  const clearChat = () => setChatMsgs([]);

  // ----- עריכת משימה -----
  const openEdit = (task) => setEditTask({ ...task });
  const closeEdit = () => setEditTask(null);
  const saveEdit = () => {
    if (!editTask || !editTask.title.trim()) return;
    setTasks((p) => p.map((t) => t.id === editTask.id ? {
      ...t,
      title: editTask.title.trim(),
      due: editTask.due || "",
      prio: editTask.prio,
      owner: editTask.owner,
      cat: editTask.cat,
      topic: editTask.topic || "general",
      repeat: editTask.repeat || "once",
    } : t));
    setEditTask(null);
    showToast("המשימה עודכנה.");
  };
  const deleteTask = () => {
    if (!editTask) return;
    setTasks((p) => p.filter((t) => t.id !== editTask.id));
    setEditTask(null);
    showToast("המשימה נמחקה.");
  };

  // הוספה ליומן הטלפון — יוצר קובץ ICS שהטלפון פותח ומוסיף עם תזכורת
  const addToCalendar = (task) => {
    if (!task.due) { showToast("קודם הוסף תאריך למשימה (בעריכה)."); return; }
    const d = task.due.replace(/-/g, ""); // YYYYMMDD
    const dtStart = d; // אירוע של יום שלם
    const dObj = new Date(task.due); dObj.setDate(dObj.getDate() + 1);
    const dtEnd = dObj.getFullYear() + String(dObj.getMonth() + 1).padStart(2, "0") + String(dObj.getDate()).padStart(2, "0");
    const uid = "olga-" + (task.id || Date.now()) + "@olga";
    const stamp = new Date().toISOString().replace(/[-:]/g, "").split(".")[0] + "Z";
    const ics = [
      "BEGIN:VCALENDAR", "VERSION:2.0", "PRODID:-//Olga//HE", "CALSCALE:GREGORIAN",
      "BEGIN:VEVENT", "UID:" + uid, "DTSTAMP:" + stamp,
      "DTSTART;VALUE=DATE:" + dtStart, "DTEND;VALUE=DATE:" + dtEnd,
      "SUMMARY:" + task.title,
      "BEGIN:VALARM", "TRIGGER:-PT9H", "ACTION:DISPLAY", "DESCRIPTION:" + task.title, "END:VALARM",
      "END:VEVENT", "END:VCALENDAR",
    ].join("\r\n");
    const blob = new Blob([ics], { type: "text/calendar;charset=utf-8" });
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url; a.download = (task.title || "task").slice(0, 20) + ".ics";
    document.body.appendChild(a); a.click(); document.body.removeChild(a);
    setTimeout(() => URL.revokeObjectURL(url), 1000);
    showToast("📅 נפתח — אשר הוספה ליומן הטלפון.");
  };

  // ----- שליחה לאפליקציית החווה (כיוון אחד, בלחיצה) -----
  const [farmSending, setFarmSending] = useState(false);
  // תרגום דחיפות: אישי -> חווה
  const prioToFarm = { high: "high", med: "medium", low: "low" };
  // אזורי החווה (כל הקטגוריות)
  const FARM_AREAS = [
    ["animals", "🐓 בעלי חיים"],
    ["forest", "🌲 יער"],
    ["nursery", "🌱 משתלה"],
    ["field", "🌾 שדה"],
    ["maint", "🔧 תחזוקה"],
    ["marketing", "📢 שיווק"],
    ["admin", "📋 ניהול"],
  ];

  const sendToFarm = async () => {
    if (!editTask) return;
    if (!farmReady) { showToast("החיבור לחווה לא זמין כרגע."); return; }
    if (farmSending) return;
    setFarmSending(true);
    try {
      const snap = await FARM_DOC().get();
      if (!snap.exists) { showToast("לא נמצא מסמך החווה."); setFarmSending(false); return; }
      const data = snap.data();
      const oT = Array.isArray(data.oT) ? data.oT.slice() : Object.values(data.oT || {});
      // בניית משימה בפורמט החווה המדויק
      const farmTask = {
        id: "ozeret-" + Date.now(),
        title: editTask.title.trim(),
        area: editTask.farmArea || "animals",
        pri: prioToFarm[editTask.prio] || "medium",
        uid: editTask.farmUid || window.FARM_MY_UID,
        scheduledDate: editTask.due || "",
        scheduledTime: editTask.farmTime || "",
        due: editTask.due || "",
        done: false,
        doneAt: null,
        createdBy: window.FARM_MY_UID,
      };
      oT.push(farmTask);
      // כתיבה של מערך oT בלבד — בלי לגעת בשום שדה אחר
      await FARM_DOC().update({ oT });
      // סימון מקומי שהמשימה נשלחה
      setTasks((p) => p.map((t) => t.id === editTask.id ? { ...t, sentToFarm: true } : t));
      setEditTask(null);
      showToast("✓ נשלחה לחווה — גיא ואליק יראו אותה.");
    } catch (e) {
      console.error("sendToFarm error:", e);
      showToast("שגיאה בשליחה לחווה. נסה שוב.");
    } finally {
      setFarmSending(false);
    }
  };

  const prioColor = (p) => (p === "high" ? C.danger : p === "med" ? C.warn : C.dim);

  if (!loaded) return <div style={{ ...S.root, textAlign: "center", paddingTop: 80, color: C.dim }}>טוען…</div>;

  return (
    <div dir="rtl" style={S.root}>
      <header style={S.header}>
        <div>
          <div style={S.eyebrow}>העוזרת {firebaseReady ? "· מחוברת" : "· מקומית"}</div>
          <h1 style={S.h1}>שלום בני</h1>
        </div>
        <div style={S.statRow}>
          <Stat label="פתוחות" value={openTasks.length} />
          <Stat label="הושלמו" value={doneCount} accent />
          <Stat label="התקדמות" value={pct + "%"} />
        </div>
      </header>

      <div style={S.voiceBar}>
        <button style={S.voiceBtn} onClick={() => speak(summaryText)}>🔊 דבר אליי</button>
        <button style={S.voiceGhost} onClick={stopSpeak}>השתק</button>
        <label style={S.voiceToggle}>
          <input type="checkbox" checked={voiceOn} onChange={(e) => setVoiceOn(e.target.checked)} />
          <span>הקראה אוטומטית בכניסה</span>
        </label>
      </div>

      <nav style={S.tabs}>
        {[["home", "בית"], ["chat", "צ׳אט"], ["cal", "📅 יומן"], ["summary", "📊 סיכומים"], ["board", "לוח"], ["trip", "מצב טיול"], ["focus", "🎧 פוקוס"], ["patterns", "דפוסים"]].map(([k, l]) => (
          <button key={k} onClick={() => setTab(k)} style={{ ...S.tab, ...(tab === k ? S.tabActive : {}) }}>{l}</button>
        ))}
      </nav>

      {tab === "home" && (
        <React.Fragment>
          {(() => {
            const todays = tasks.filter((t) => t.due === tk && t.status !== "done");
            if (todays.length === 0) return null;
            return (
              <section style={S.todayBanner}>
                <div style={S.todayBannerTop}>
                  <span style={S.todayBannerIcon}>📅</span>
                  <span style={S.todayBannerTitle}>היום יש לך {todays.length} {todays.length === 1 ? "משימה" : "משימות"}</span>
                </div>
                <div style={S.todayBannerList}>{todays.slice(0, 4).map((t) => t.title).join(" · ")}{todays.length > 4 ? " ועוד…" : ""}</div>
              </section>
            );
          })()}
          {checkedInDay !== tk ? (
            <section style={S.checkin}>
              <div style={S.greeting}>{greeting}</div>
              <div style={S.checkinRow}>
                <input style={S.focusInput} value={focus} onChange={(e) => setFocus(e.target.value)}
                  placeholder="הדבר האחד שחייב לקרות היום…" onKeyDown={(e) => e.key === "Enter" && checkIn()} />
                <button style={S.btnAccent} onClick={checkIn}>נעל מוקד</button>
              </div>
            </section>
          ) : (
            <section style={S.focusLocked}>
              <div><div style={S.dimSmall}>המוקד שלך להיום</div><div style={S.focusText}>{focus}</div></div>
              <button style={S.btnGhost} onClick={() => setCheckedInDay(null)}>שנה</button>
            </section>
          )}

          <section style={S.weekCube}>
            <div style={S.weekHead}>
              <span style={S.weekTitle}>📅 השבוע</span>

                    <button style={S.check} onClick={() => setStatus(t.id, "done")} aria-label="בוצע" />
                    <div style={{ flex: 1 }}>
                      <div style={{ ...S.taskTitle, textDecoration: t.status === "done" ? "line-through" : "none" }}>{t.title}</div>
                      <div style={S.taskMeta}>
                        <span style={{ ...S.pill, borderColor: topicOf(t.topic).color, color: topicOf(t.topic).color }}>{topicOf(t.topic).emoji} {topicOf(t.topic).label}</span>
                      </div>
                    </div>
                    <button style={S.editBtn} onClick={() => { openEdit(t); setCalDay(null); }}>✎ ערוך</button>
                  </div>
                </div>
              ))}
            </div>
            <div style={{ ...S.addRow, marginTop: 14 }}>
              <input style={S.addInput} value={calNewTask} onChange={(e) => setCalNewTask(e.target.value)}
                placeholder="הוסף משימה ליום זה…" onKeyDown={(e) => e.key === "Enter" && addTaskOnDay(calDay)} />
              <button style={S.btnAccent} onClick={() => addTaskOnDay(calDay)}>+</button>
            </div>
          </div>
        </div>
      )}

      {tab === "focus" && (
        <section style={{ marginTop: 24 }}>
          <div style={S.tripHead}>
            <div><div style={S.eyebrow}>מוזיקה לעבודה</div><h2 style={S.tripH2}>פוקוס</h2></div>
          </div>
          <div style={S.focusHint}>בחר פלייליסט — ייפתח ביוטיוב בלשונית חדשה, ותוכל לעבוד עם מוזיקה ברקע.</div>

          {/* טיימר פומודורו */}
          <div style={{ ...S.pomoCard, borderColor: pomoMode === "break" ? C.good : C.accent }}>
            <div style={S.pomoLabel}>{pomoMode === "work" ? "🍅 זמן עבודה" : "☕ זמן הפסקה"}</div>
            <div style={{ ...S.pomoTime, color: pomoMode === "break" ? C.good : C.accent }}>{pomoFmt(pomoLeft)}</div>
            <div style={S.pomoBtns}>
              <button style={S.pomoMain} onClick={() => setPomoRunning((r) => !r)}>
                {pomoRunning ? "⏸ עצור" : "▶ התחל"}
              </button>
              <button style={S.pomoGhost} onClick={pomoReset}>איפוס</button>
            </div>
            <div style={S.pomoCount}>סבבים שהושלמו היום: {pomoCount} {pomoCount > 0 ? "🍅".repeat(Math.min(pomoCount, 8)) : ""}</div>
          </div>

          <div style={S.musicSectionTitle}>מוזיקה ברקע</div>
          <div style={S.musicGrid}>
            {[
              { emoji: "🎧", label: "לופי לעבודה", sub: "Lo-fi beats לריכוז", url: "https://www.youtube.com/results?search_query=lofi+hip+hop+study+work" },
              { emoji: "🌿", label: "צלילי טבע", sub: "יער, ציפורים, רוח", url: "https://www.youtube.com/results?search_query=nature+forest+sounds+relax" },
              { emoji: "🎹", label: "קלאסי רגוע", sub: "פסנתר ומיתרים", url: "https://www.youtube.com/results?search_query=calm+classical+piano+focus" },
              { emoji: "🌊", label: "אמביינט עמוק", sub: "צלילים לריכוז עמוק", url: "https://www.youtube.com/results?search_query=ambient+deep+focus+music" },
              { emoji: "☕", label: "בוקר נעים", sub: "מוזיקה לבוקר עבודה", url: "https://www.youtube.com/results?search_query=morning+coffee+jazz+music" },
              { emoji: "🔥", label: "אנרגיה לעבודה", sub: "קצב לעבודה פעילה", url: "https://www.youtube.com/results?search_query=upbeat+work+focus+playlist" },
              { emoji: "💪", label: "מוטיבציה", sub: "מוזיקה מדרבנת לדחיפה", url: "https://www.youtube.com/results?search_query=motivation+music+workout+energy" },
              { emoji: "🌅", label: "התעוררות", sub: "להתחיל את הבוקר בכוח", url: "https://www.youtube.com/results?search_query=good+morning+wake+up+energy+music" },
            ].map((m, i) => (
              <a key={i} href={m.url} target="_blank" rel="noopener noreferrer" style={S.musicCard}>
                <span style={S.musicEmoji}>{m.emoji}</span>
                <span style={S.musicLabel}>{m.label}</span>
                <span style={S.musicSub}>{m.sub}</span>
              </a>
            ))}
          </div>
        </section>
      )}

      {tab === "patterns" && (
        <section style={{ marginTop: 24 }}>
          <div style={S.tripHead}>
            <div><div style={S.eyebrow}>למה אני נתקע</div><h2 style={S.tripH2}>הדפוסים שלך</h2></div>
            <div style={{ textAlign: "left" }}><div style={S.statValue}>{allFeedback.length}</div><div style={S.statLabel}>משובים נאספו</div></div>
          </div>
          {allFeedback.length < 3 && !patterns && (
            <div style={S.calm}>עדיין צריך עוד משובים. תן משוב על {3 - allFeedback.length} משימות נוספות והעוזרת תתחיל לזהות את הדפוסים שלך אוטומטית.</div>
          )}
          {patBusy && <div style={S.calm}>מנתחת את הדפוסים שלך…</div>}
          {patterns && patterns.error && <div style={S.tripAlert}><div>{patterns.error}</div></div>}
          {patterns && !patterns.error && (
            <div style={S.patWrap}>
              <PatCard num="01" title="דפוסים לפי סוג משימה" body={patterns.byType} color={C.accent} />
              <PatCard num="02" title="הסיבה העיקרית לתקיעות" body={patterns.rootCause} color={C.warn} />
              <PatCard num="03" title="השינוי האחד הכי משפיע" body={patterns.oneChange} color={C.good} accent />
              <PatCard num="04" title="התקדמות לאורך זמן" body={patterns.trend} color={C.accent2} />
            </div>
          )}
          {allFeedback.length >= 3 && (
            <button style={{ ...S.btnGhost, marginTop: 18 }} disabled={patBusy} onClick={() => analyzePatterns(allFeedback.length)}>
              {patBusy ? "מנתחת…" : "נתח מחדש עכשיו"}
            </button>
          )}
          <div style={S.tripNote}>הניתוח מתעדכן אוטומטית כל 3 משובים חדשים. ככל שתתעד יותר, התמונה תהיה מדויקת ואישית יותר.</div>
        </section>
      )}

      {/* חיבור AI */}
      <div style={S.keyBox}>
        <button style={S.keyToggle} onClick={() => setShowKey(!showKey)}>
          {showKey ? "▾" : "▸"} חיבור AI {apiKey ? "· מחובר ✓" : "· לא מחובר"}
        </button>
        {showKey && (
          <div style={{ marginTop: 12 }}>
            <div style={S.dimSmall}>הדבק מפתח Anthropic API להפעלת פירוק משימות, משוב וניתוח דפוסים. נשמר רק בדפדפן שלך.</div>
            <div style={{ display: "flex", gap: 8, marginTop: 10 }}>
              <input type="password" style={S.addInput} value={apiKey} onChange={(e) => saveKey(e.target.value)} placeholder="sk-ant-..." />
            </div>
          </div>
        )}
      </div>

      {fbTask && (
        <div style={S.modalWrap} onClick={closeFeedback}>
          <div style={S.modal} onClick={(e) => e.stopPropagation()} dir="rtl">
            <div style={S.modalHead}>
              <div><div style={S.dimSmall}>משוב על המשימה</div><div style={S.modalTitle}>{fbTask.title}</div></div>
              <button style={S.modalX} onClick={closeFeedback}>✕</button>
            </div>
            {!fbReply && (
              <React.Fragment>
                <div style={S.modalQ}>איך היה? מה עבד, מה פחות?</div>
                <textarea style={S.modalTextarea} value={fbText} onChange={(e) => setFbText(e.target.value)} rows={4}
                  placeholder="לדוגמה: ניגנתי 10 דקות אבל האצבעות לא הקשיבו, נתקעתי באותו קטע…" />
                <button style={S.btnAccent} disabled={fbBusy || !fbText.trim()} onClick={sendFeedback}>{fbBusy ? "חושבת…" : "קבל משוב"}</button>
              </React.Fragment>
            )}
            {fbReply && (
              <React.Fragment>
                <div style={S.replyBox}>{fbReply}</div>
                <div style={S.modalBtns}>
                  <button style={S.btnGhost} onClick={() => { setFbReply(null); setFbText(""); }}>עוד משוב</button>
                  <button style={S.btnAccent} onClick={closeFeedback}>סגור</button>
                </div>
              </React.Fragment>
            )}
            {bonusArr(fbTask.feedback).length > 0 && (
              <div style={S.histWrap}>
                <div style={S.dimSmall}>פעמים קודמות</div>
                {bonusArr(fbTask.feedback).slice().reverse().map((h, i) => (
                  <div key={i} style={S.histRow}><span style={S.histDate}>{fmtHe(h.date)}</span><span style={S.histNote}>{h.note}</span></div>
                ))}
              </div>
            )}
          </div>
        </div>
      )}

      {/* חלון עריכת משימה */}
      {editTask && (
        <div style={S.modalWrap} onClick={closeEdit}>
          <div style={S.modal} onClick={(e) => e.stopPropagation()} dir="rtl">
            <div style={S.modalHead}>
              <div style={S.modalTitle}>עריכת משימה</div>
              <button style={S.modalX} onClick={closeEdit}>✕</button>
            </div>

            <label style={S.editLabel}>שם המשימה</label>
            <input style={S.modalTextarea} value={editTask.title}
              onChange={(e) => setEditTask({ ...editTask, title: e.target.value })} />

            <label style={S.editLabel}>תאריך יעד</label>
            <input type="date" style={S.editInput} value={editTask.due || ""}
              onChange={(e) => setEditTask({ ...editTask, due: e.target.value })} />

            <label style={S.editLabel}>דחיפות</label>
            <div style={S.editChips}>
              {[["high", "דחוף"], ["med", "רגיל"], ["low", "נמוך"]].map(([v, l]) => (
                <button key={v} onClick={() => setEditTask({ ...editTask, prio: v })}
                  style={{ ...S.editChip, ...(editTask.prio === v ? { background: prioColor(v), color: "#ffffff", borderColor: prioColor(v) } : {}) }}>{l}</button>
              ))}
            </div>

            <label style={S.editLabel}>בעלים</label>
            <div style={S.editChips}>
              {["בני", "צוות", "הזוג", "גיא", "אליק"].map((o) => (
                <button key={o} onClick={() => setEditTask({ ...editTask, owner: o })}
                  style={{ ...S.editChip, ...(editTask.owner === o ? { background: C.accent2, color: "#ffffff", borderColor: C.accent2 } : {}) }}>{o}</button>
              ))}
            </div>

            <label style={S.editLabel}>נושא</label>
            <div style={S.editChips}>
              {Object.entries(TOPICS).map(([k, t]) => (
                <button key={k} onClick={() => setEditTask({ ...editTask, topic: k })}
                  style={{ ...S.editChip, ...((editTask.topic || "general") === k ? { background: t.color, color: "#fff", borderColor: t.color } : { color: t.color, borderColor: t.color }) }}>
                  {t.emoji} {t.label}
                </button>
              ))}
            </div>

            <label style={S.editLabel}>תדירות</label>
            <div style={S.editChips}>
              {Object.entries(REPEATS).map(([k, l]) => (
                <button key={k} onClick={() => setEditTask({ ...editTask, repeat: k })}
                  style={{ ...S.editChip, ...((editTask.repeat || "once") === k ? { background: C.accent, color: "#fff", borderColor: C.accent } : {}) }}>{l}</button>
              ))}
            </div>

            <label style={S.editLabel}>קטגוריה</label>
            <input style={S.editInput} value={editTask.cat || ""}
              onChange={(e) => setEditTask({ ...editTask, cat: e.target.value })} placeholder="טיסה / פרויקט / כללי…" />

            <button style={S.calAddBtn} onClick={() => addToCalendar(editTask)}>📅 הוסף ליומן הטלפון (עם תזכורת)</button>

            {/* ----- משימת חווה ----- */}
            {farmReady && (
              <div style={S.farmBox}>
                <label style={S.farmCheck}>
                  <input type="checkbox" checked={!!editTask.isFarm}
                    onChange={(e) => setEditTask({ ...editTask, isFarm: e.target.checked })} />
                  <span>🌾 משימת חווה — לשלוח לניהול החווה</span>
                </label>

                {editTask.isFarm && (
                  <div style={{ marginTop: 12 }}>
                    <label style={S.editLabel}>אזור בחווה</label>
                    <div style={S.editChips}>
                      {FARM_AREAS.map(([v, l]) => (
                        <button key={v} onClick={() => setEditTask({ ...editTask, farmArea: v })}
                          style={{ ...S.editChip, ...(editTask.farmArea === v ? { background: C.accent2, color: "#ffffff", borderColor: C.accent2 } : {}) }}>{l}</button>
                      ))}
                    </div>

                    <label style={S.editLabel}>שעה (אופציונלי)</label>
                    <input type="time" style={S.editInput} value={editTask.farmTime || ""}
                      onChange={(e) => setEditTask({ ...editTask, farmTime: e.target.value })} />

                    <button style={{ ...S.btnAccent, width: "100%", marginTop: 14, opacity: farmSending ? 0.6 : 1 }}
                      disabled={farmSending} onClick={sendToFarm}>
                      {farmSending ? "שולח…" : "🌾 שלח לחווה"}
                    </button>
                    {editTask.sentToFarm && <div style={S.farmSent}>✓ כבר נשלחה לחווה</div>}
                  </div>
                )}
              </div>
            )}

            <div style={{ ...S.modalBtns, marginTop: 20 }}>
              <button style={S.btnAccent} onClick={saveEdit}>שמור</button>
              <button style={S.btnGhost} onClick={closeEdit}>ביטול</button>
              <button style={S.deleteBtn} onClick={deleteTask}>מחק</button>
            </div>
          </div>
        </div>
      )}

      {toast && <div style={S.toast}>{toast}</div>}
      <footer style={S.footer}>{firebaseReady ? "מחובר ל-Firebase · הנתונים נשמרים." : "מצב מקומי — חבר Firebase לשמירה קבועה (ראה מדריך)."}</footer>
    </div>
  );
}

function Stat({ label, value, accent }) {
  return <div style={S.stat}><div style={{ ...S.statValue, color: accent ? C.accent : C.text }}>{value}</div><div style={S.statLabel}>{label}</div></div>;
}
function SectionTitle({ children }) { return <div style={S.sectionTitle}>{children}</div>; }
function PatCard({ num, title, body, color, accent }) {
  return (
    <div style={{ ...S.patCard, borderColor: accent ? color : C.line, background: accent ? "rgba(0,200,117,0.1)" : C.panel }}>
      <div style={{ ...S.patNum, color }}>{num}</div>
      <div style={{ flex: 1 }}><div style={{ ...S.patTitle, color }}>{title}</div><div style={S.patBody}>{body}</div></div>
    </div>
  );
}
